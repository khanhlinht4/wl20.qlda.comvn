<style>
:root{
  --bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--border:#e2e8f0;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --blue:#2563eb;--blue-light:#eff6ff;--blue-dark:#1d4ed8;
  --green:#16a34a;--green-light:#f0fdf4;
  --amber:#d97706;--amber-light:#fffbeb;
  --red:#dc2626;--red-light:#fef2f2;
  --purple:#7c3aed;--purple-light:#f5f3ff;
  --slate:#64748b;
  --radius:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.08),0 4px 6px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.app{max-width:1140px;margin:0 auto;padding:24px 16px 80px}

/* TOPBAR */
.topbar{background:var(--text);color:#fff;position:sticky;top:0;z-index:100;padding:0 20px;box-shadow:var(--shadow-md)}
.topbar-inner{max-width:1140px;margin:0 auto;display:flex;align-items:center;height:56px;gap:16px}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:-.3px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;color:#94a3b8;margin-top:1px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;flex-shrink:0}
.sync-dot.offline{background:#f59e0b}
.sync-dot.error{background:#ef4444}
#syncText{font-size:11px;color:#94a3b8}

/* BUTTONS */
button{cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;border:none;border-radius:var(--radius);padding:8px 14px;transition:all .15s;outline:none}
.btn{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn:hover{background:var(--border);color:var(--text)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #fecaca}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:7px}
.btn-icon{padding:6px 10px;border-radius:8px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.card-body{padding:16px 20px}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;box-shadow:var(--shadow)}
.metric-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-size:26px;font-weight:700;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* TABS */
.tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:4px;gap:4px;margin-bottom:20px;box-shadow:var(--shadow)}
.tab{flex:1;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;transition:all .15s;text-align:center}
.tab.active{background:var(--blue);color:#fff;box-shadow:var(--shadow-md)}
.tab:hover:not(.active){background:var(--surface2)}

/* PROJECT CARD */
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;transition:box-shadow .2s}
.proj-card:hover{box-shadow:var(--shadow-md)}
.proj-row{display:flex;align-items:center;gap:16px;padding:16px 20px;cursor:pointer;flex-wrap:wrap}
.proj-chevron{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.proj-chevron.open{transform:rotate(180deg)}
.proj-detail{padding:4px 20px 20px;border-top:1px solid var(--border)}

/* PHASE CARDS */
.phases-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding-top:16px}
.phase-card{border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;border:1.5px solid;transition:transform .15s,box-shadow .15s}
.phase-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.phase-icon{font-size:18px;margin-bottom:8px}
.phase-name{font-size:12px;font-weight:700;margin-bottom:8px}
.phase-pct{font-size:20px;font-weight:800;margin-top:6px}
.phase-status{font-size:11px;font-weight:600;margin-top:2px}
.phase-assignee{font-size:11px;color:var(--text3);margin-top:4px}
.phase-dates{font-size:11px;margin-top:8px;padding-top:8px;border-top:1.5px solid}
.phase-wd{font-size:11px;font-weight:600;margin-top:2px}
.phase-files{font-size:11px;font-weight:600;margin-top:6px}

/* PROGRESS BAR */
.pbar{background:#e2e8f0;border-radius:999px;height:6px;overflow:hidden;margin-top:6px}
.pbar-fill{height:100%;border-radius:999px;transition:width .4s}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:10px 12px;border-bottom:2px solid var(--border);background:var(--surface2);text-align:left;white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2)}
.tbl-total td{background:var(--blue-light)!important;font-weight:700;color:var(--blue-dark)}

/* SECTION (CUM) */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow)}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--surface2);cursor:pointer;border-bottom:1px solid transparent}
.sec-hdr:hover{background:var(--border)}
.sec-hdr.open{border-bottom-color:var(--border)}
.sec-chevron{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.sec-chevron.open{transform:rotate(90deg)}

/* SUMMARY */
.summary-box{border:2px solid var(--blue);border-radius:var(--radius-lg);overflow:hidden;margin-top:16px}
.summary-hdr{background:var(--blue);padding:12px 16px;color:#fff;font-weight:700;font-size:13px}

/* FORM */
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
input[type=text],input[type=number],input[type=date],select,textarea{
  padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);
  font-family:inherit;font-size:13px;color:var(--text);background:var(--surface);
  width:100%;transition:border-color .15s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
input[type=range]{width:100%;accent-color:var(--blue);height:4px}
.form-grid{display:grid;gap:12px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
.form-grid-6{grid-template-columns:2fr 0.8fr 0.8fr 0.8fr 1.2fr 1.5fr}

/* ADD FORMS */
.add-form{background:var(--blue-light);border:1px solid #bfdbfe;border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.add-form-gc{background:var(--purple-light);border:1px solid #ddd6fe;border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.add-item-form{background:var(--blue-light);border-top:1px solid #bfdbfe;padding:14px 16px;display:none}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.modal{background:var(--surface);border-radius:var(--radius-xl);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-hdr{padding:20px 24px;border-radius:var(--radius-xl) var(--radius-xl) 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center}

/* FILE ROW */
.file-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:8px;padding:8px 12px;margin-bottom:6px}

/* CONFIRM */
.confirm-box{background:var(--surface);border-radius:var(--radius-xl);padding:24px;max-width:380px;width:100%;box-shadow:var(--shadow-lg)}

/* HISTORY */
.hist-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface2);border-radius:var(--radius-lg);border:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap}
.hist-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}

/* INSTALL BAR */
.install-bar{position:fixed;bottom:0;left:0;right:0;background:var(--text);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:800;box-shadow:0 -4px 20px rgba(0,0,0,.2)}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;z-index:999;display:none;box-shadow:var(--shadow-lg);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px}

@media(max-width:600px){
  .form-grid-3{grid-template-columns:1fr 1fr}
  .form-grid-6{grid-template-columns:1fr 1fr}
  .phases-grid{grid-template-columns:1fr 1fr}
  .metrics-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

function fbWrite(label){
  if(_fbTimer) clearTimeout(_fbTimer);
  setSyncUI('saving');
  _fbTimer=setTimeout(function(){
    lsSave(STATE.projects,STATE.hist);
    if(!db||!_isOnline){setSyncUI('offline');return;}
    db.ref('atpm/projects').set(STATE.projects);
    if(label){STATE.hist=pushHist(STATE.hist,STATE.projects,label);db.ref('atpm/history').set(STATE.hist);}
    setSyncUI('ok');
  },800);
}

function setSyncUI(status){
  var dot=document.getElementById('syncDot');
  var txt=document.getElementById('syncText');
  if(!dot||!txt) return;
  dot.className='sync-dot';
  if(status==='ok'){txt.textContent=S.synced;}
  else if(status==='saving'){txt.textContent=S.syncing;dot.className='sync-dot offline';}
  else if(status==='offline'){txt.textContent=S.offline;dot.className='sync-dot offline';}
  else{txt.textContent=S.connError;dot.className='sync-dot error';}
}

function addProject(){
  var name=document.getElementById('np_name');var client=document.getElementById('np_client');var dl=document.getElementById('np_deadline');

  var maxId=STATE.projects.reduce(function(m,p){return Math.max(m,p.id);},0);
  STATE.projects.push({id:maxId+1,name:name.value.trim(),client:client.value.trim()||'—',deadline:dl.value||'',
    phases:{concept:{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},'3d':{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},'2d':{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},bom:{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''}},
    bom:{cumList:[],giaCong:[]}});
  save('Th\u00eam d\u1ef1 \u00e1n: '+name.value.trim());render();toast('T\u1ea1o d\u1ef1 \u00e1n th\u00e0nh c\u00f4ng!');
}
function toggleHist(){STATE.showHist=!STATE.showHist;render();}

function restoreHist(i){showConfirm('Kh\u00f4i ph\u1ee5c v\u1ec1 phi\u00ean b\u1ea3n "'+(STATE.hist[i].lb)+'"?\nD\u1eef li\u1ec7u hi\u1ec7n t\u1ea1i s\u1ebd b\u1ecb ghi \u0111\u00e8.',function(){var d=cloneDeep(STATE.hist[i].data);STATE.projects=d;save('Kh\u00f4i ph\u1ee5c t\u1eeb: '+STATE.hist[i].lb);render();toast(S.restoreOK);});}

// ── RENDER ─────────────────────────────────────────────────
function renderMetrics(){
  var done=STATE.projects.reduce(function(a,p){return a+Object.values(p.phases).filter(function(ph){return ph.status==='done';}).length;},0);
  var total=STATE.projects.length*4||1;
  var inp=STATE.projects.reduce(function(a,p){return a+Object.values(p.phases).filter(function(ph){return ph.status==='in-progress';}).length;},0);
  var pct=Math.round(done/total*100);
  return '<div class="metrics-grid">'
    +'<div class="metric-card"><div class="metric-label">'+S.totalProj+'</div><div class="metric-value" style="color:var(--blue)">'+STATE.projects.length+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">'+S.phaseDone+'</div><div class="metric-value" style="color:var(--green)">'+done+'<span style="font-size:14px;color:var(--text3)">/'+total+'</span></div></div>'
    +'<div class="metric-card"><div class="metric-label">'+S.inProgress+'</div><div class="metric-value" style="color:var(--amber)">'+inp+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">'+S.completion+'</div><div class="metric-value" style="color:var(--purple)">'+pct+'%</div><div class="metric-sub">'+pbar(pct,'#7c3aed')+'</div></div>'
    +'</div>';}

function renderHistory(){
  if(!STATE.showHist) return '';
  var rows=STATE.hist.length===0
    ?'<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px">'+S.noHist+'</div>'
    :STATE.hist.map(function(entry,i){
      return '<div class="hist-row">'
        +'<div class="hist-num" style="background:'+(i===0?'var(--blue)':'var(--surface2)')+';color:'+(i===0?'#fff':'var(--text2)')+'">'+( STATE.hist.length-i)+'</div>'
        +'<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(entry.lb)+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+esc(entry.ts)+'</div></div>'
        +(i===0?'<span class="badge" style="background:var(--blue-light);color:var(--blue);flex-shrink:0">'+S.newest+'</span>':'')
        +'<div style="display:flex;gap:6px;flex-shrink:0">'
        +'<button class="btn btn-sm" onclick="dlHistEntry('+i+')">'+S.dlJson+'</button>'
        +'<button class="btn btn-sm" style="background:var(--amber-light);color:var(--amber);border-color:#fde68a" onclick="restoreHist('+i+')">'+S.restore+'</button>'
        +'</div></div>';

    +'<div class="card-body">'+rows
    +'<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    +'<span style="font-size:12px;color:var(--text3);flex:1">'+S.histNote+'</span>'
    +'<input type="file" id="impInput" accept=".json" style="display:none" onchange="impJSON(this)">'
    +'<button class="btn btn-sm" onclick="document.getElementById(\'impInput\').click()">'+S.importJson+'</button>'
    +'<button class="btn btn-sm" style="background:var(--green-light);color:var(--green);border-color:#86efac" onclick="expJSON()">'+S.exportJson+'</button>'
    +'</div></div></div>';}

function renderOverview(){
  var stOpts='<option value="all"'+(STATE.filter==='all'?' selected':'')+'>'+S.filterAll+'</option>'
    +Object.entries(ST).map(function(kv){return '<option value="'+kv[0]+'"'+(STATE.filter===kv[0]?' selected':'')+'>'+kv[1].lb+'</option>';}).join('');
  var filtered=STATE.filter==='all'?STATE.projects:STATE.projects.filter(function(p){return Object.values(p.phases).some(function(ph){return ph.status===STATE.filter;});});
  var html='<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">'
    +'<select onchange="STATE.filter=this.value;render()" style="width:auto;border-radius:var(--radius);padding:8px 12px">'+stOpts+'</select>'
    +'<button class="btn-primary btn-sm" onclick="showAddProject()" style="margin-left:auto">'+S.addProj+'</button>'
    +'</div>'
    +'<div id="addProjForm" style="display:none" class="add-form">'
    +'<div style="font-size:14px;font-weight:700;color:var(--blue);margin-bottom:14px">'+S.newProj+'</div>'
    +'<div class="form-grid form-grid-3" style="margin-bottom:12px">'
    +'<div class="form-group"><label class="form-label">'+S.projName+' *</label><input id="np_name" placeholder="'+S.projNamePH+'"></div>'
    +'<div class="form-group"><label class="form-label">'+S.client+'</label><input id="np_client" placeholder="'+S.clientPH+'"></div>'
    +'<div class="form-group"><label class="form-label">'+S.deadline+'</label><input type="date" id="np_deadline"></div>'
    +'</div>'
    +'<div style="display:flex;gap:8px"><button class="btn-primary btn-sm" onclick="addProject()">'+S.createProj+'</button><button class="btn btn-sm" onclick="hideAddProject()">'+S.cancel+'</button></div>'
    +'</div>';

  if(filtered.length===0){
    html+='<div class="empty-state"><div class="empty-icon">&#128203;</div><div class="empty-title">Ch\u01b0a c\u00f3 d\u1ef1 \u00e1n n\u00e0o</div><div style="font-size:13px">Nh\u1ea5n "+ Th\u00eam d\u1ef1 \u00e1n" \u0111\u1ec3 b\u1eaft \u0111\u1ea7u</div></div>';
    return html;
  }

  filtered.forEach(function(project){
    var ov=getOverall(project.phases),dl=getDL(project.deadline),isO=STATE.selId===project.id;
    html+='<div class="proj-card">'
      +'<div class="proj-row" onclick="toggleSel('+project.id+')">'
      +'<div style="flex:1;min-width:0">';
    if(isO){
      html+='<input value="'+esc(project.name)+'" onclick="event.stopPropagation()" oninput="renameProj('+project.id+',this.value)" style="font-weight:700;font-size:15px;border:none;border-bottom:2px solid var(--blue);background:transparent;padding:2px 0;width:100%;outline:none;color:var(--text)">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">'
        +'<span style="font-size:11px;font-weight:600;color:var(--text3)">'+S.clientLabel+'</span>'
        +'<input value="'+esc(project.client)+'" onclick="event.stopPropagation()" oninput="editClient('+project.id+',this.value)" style="font-size:12px;border:none;border-bottom:1px solid var(--border);background:transparent;padding:1px 4px;color:var(--text2);min-width:100px">'
        +'<span style="font-size:11px;font-weight:600;color:var(--text3)">'+S.dlLabel+'</span>'
        +'<input type="date" value="'+esc(project.deadline||'')+'" onclick="event.stopPropagation()" onchange="editDeadline('+project.id+',this.value)" style="font-size:12px;border:none;border-bottom:1px solid var(--border);background:transparent;padding:1px 4px;color:var(--text2)">'
        +'</div>';
    } else {
      html+='<div style="font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(project.name)+'</div>'
        +'<div style="font-size:12px;color:var(--text3);margin-top:3px">'+esc(project.client)+'</div>';
    }
    html+='</div>'
      +'<span class="badge" style="background:'+dl.b+';color:'+dl.c+';flex-shrink:0">'+dl.t+'</span>'
      +'<div style="min-width:110px;flex-shrink:0"><div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:600">'+S.totalProgress+' '+ov+'%</div>'+pbar(ov)+'</div>'
      +'<span class="proj-chevron'+(isO?' open':'')+'">&#9660;</span>'
      +'</div>';

    if(isO){
      html+='<div class="proj-detail"><div class="phases-grid">';
      ['concept','3d','2d','bom'].forEach(function(ph){
        var data=project.phases[ph],sc=ST[data.status],wd=workdays(data.startDate,data.endDate);
        html+='<div class="phase-card" style="background:'+sc.bg+';border-color:'+sc.bo+'" onclick="openPhaseModal('+project.id+',\''+ph+'\')">'
          +'<div class="phase-icon">'+PH_IC[ph]+'</div>'
          +'<div class="phase-name" style="color:'+sc.dk+'">'+PH_LB[ph]+'</div>'
          +pbar(data.progress,sc.co)
          +'<div class="phase-pct" style="color:'+sc.dk+'">'+data.progress+'%</div>'
          +'<div class="phase-status" style="color:'+sc.co+'">'+sc.lb+'</div>'
          +'<div class="phase-assignee">'+esc(data.assignee||'—')+'</div>';
        if(data.startDate||data.endDate){html+='<div class="phase-dates" style="border-color:'+sc.bo+';color:'+sc.dk+'">'+fd(data.startDate)+' \u2192 '+fd(data.endDate);if(wd)html+='<div class="phase-wd" style="color:'+sc.co+'">&#9201; '+wd+S.workdays+'</div>';html+='</div>';}
        if((data.files||[]).length>0)html+='<div class="phase-files" style="color:'+sc.co+'">&#128206; '+(data.files.length)+' t\u00e0i li\u1ec7u</div>';
        html+='</div>';
      });
      html+='</div>'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;flex-wrap:wrap;gap:8px">'
        +'<span style="font-size:12px;color:var(--text3)">'+S.clickPhase+'</span>'
        +'<div style="display:flex;gap:8px">'
        +'<button class="btn btn-sm" style="background:var(--blue);color:#fff;border-color:var(--blue)" onclick="goBOM('+project.id+')">'+S.viewBOM+'</button>'
        +'<button class="btn btn-sm btn-danger" onclick="delProject('+project.id+')">'+S.deleteProj+'</button>'
        +'</div></div></div>';
    }
    html+='</div>';
  });
  return html;}

            +'<td style="color:'+(item.price>0?'var(--green)':'var(--text3)')+';font-weight:'+(item.price>0?700:400)+'">'+( item.price>0?fmtVND(item.price):'—')+'</td>'
            +'<td style="white-space:nowrap">'
            +'<button class="btn btn-xs" style="background:var(--blue-light);color:var(--blue);border-color:#bfdbfe;margin-right:4px" onclick="searchPrice(\''+esc(item.name)+'\')">&#128269;</button>'
            +'<button class="btn btn-xs" style="margin-right:4px" onclick="editItem('+ci+','+ii+')">&#9999;&#65039;</button>'
            +'<button class="btn btn-xs btn-danger" onclick="delItem('+ci+','+ii+')">&#128465;</button>'
            +'</td></tr>';
        });
        html+='</tbody></table></div>';
      }
    }
    html+='</div>';
  });

  // Summary
  var allItems=p.bom.cumList.reduce(function(a,c){return a.concat(c.items);},[]);
  var sum={};allItems.forEach(function(i){var k=i.name.toLowerCase();if(!sum[k])sum[k]={name:i.name,qty:0,unit:i.unit,price:i.price,supplier:i.supplier};sum[k].qty+=i.qty;if(i.price>0&&!sum[k].price)sum[k].price=i.price;});
  var srows=Object.values(sum).sort(function(a,b){return a.name.localeCompare(b.name);});
  if(srows.length){
    var gTotal=srows.reduce(function(s,r){return s+r.qty*(r.price||0);},0);
    html+='<div class="summary-box"><div class="summary-hdr">&#128202; '+S.summaryTitle+'</div>'
      +'<div style="overflow-x:auto"><table class="tbl"><thead><tr style="background:var(--blue-light)"><th style="color:var(--blue)">'+S.colName+'</th><th style="color:var(--blue)">'+S.colQty+'</th><th style="color:var(--blue)">'+S.colUnit+'</th><th style="color:var(--blue)">'+S.colNCC+'</th><th style="color:var(--blue)">'+S.colPrice+'</th><th style="color:var(--blue)">'+S.colTotal+'</th></tr></thead><tbody>';
    srows.forEach(function(r){
      html+='<tr><td style="font-weight:500">'+esc(r.name)+'</td><td style="text-align:right;font-weight:700;color:var(--blue)">'+r.qty+'</td><td style="color:var(--text3)">'+esc(r.unit)+'</td><td>'+esc(r.supplier||'—')+'</td><td>'+( r.price>0?fmtVND(r.price):'—')+'</td><td style="color:var(--green);font-weight:700">'+( r.price>0?fmtVND(r.qty*r.price):'—')+'</td></tr>';
    });
    html+='<tr class="tbl-total"><td colspan="5">'+S.total+'</td><td>'+fmtVND(gTotal)+'</td></tr>';
    html+='</tbody></table></div></div>';
  }
  return html;}

function renderGiaCong(p){
  var items=p.bom.giaCong;
  var tC=items.filter(function(i){return i.loai==='Chi ti\u1ebft';}).reduce(function(s,i){return s+i.qty*i.donGia;},0);
  var tCu=items.filter(function(i){return i.loai==='C\u1ee5m';}).reduce(function(s,i){return s+i.qty*i.donGia;},0);
  var html='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px">'
    +[{l:S.gcCT,v:tC,c:'var(--blue)'},{l:S.gcCum,v:tCu,c:'var(--purple)'},{l:S.gcTotal,v:tC+tCu,c:'var(--green)'}].map(function(m){
      return '<div class="metric-card"><div class="metric-label">'+m.l+'</div><div class="metric-value" style="color:'+m.c+'">'+fmtVND(m.v)+'</div></div>';
    }).join('')+'</div>'
    +'<div id="gcForm" style="display:none" class="add-form-gc">'
    +'<div style="font-size:13px;font-weight:700;color:var(--purple);margin-bottom:12px">+ Th\u00eam h\u1ea1ng m\u1ee5c gia c\u00f4ng</div>'
    +'<div class="form-grid form-grid-6" style="margin-bottom:10px">';
  [['gc_name',S.gcName,'text','',S.gcName],['gc_loai',S.gcType,'sel-gc','',''],['gc_qty',S.gcQty,'number','1',''],['gc_unit',S.gcUnit,'sel-unit','',''],['gc_donGia',S.gcPrice,'number','0',''],['gc_ghiChu',S.gcNote,'text','','']].forEach(function(row){
    var id=row[0],lb=row[1],type=row[2],val=row[3];
    var ctrl=type==='sel-gc'?'<select id="'+id+'">'+GCLT.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>'
      :type==='sel-unit'?'<select id="'+id+'">'+BUNT.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>'
      :'<input type="'+(type==='number'?'number':'text')+'" id="'+id+'" value="'+val+'">';
    html+='<div><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px">'+lb+'</div>'+ctrl+'</div>';
  });
  html+='</div><div style="display:flex;gap:8px"><button class="btn-purple btn-sm" onclick="addGC()" style="background:var(--purple)">Th\u00eam</button><button class="btn btn-sm" onclick="document.getElementById(\'gcForm\').style.display=\'none\'">'+S.cancel+'</button></div></div>'
    +'<div style="display:flex;gap:10px;margin-bottom:12px">'
    +'<button class="btn btn-sm" style="background:var(--purple);color:#fff;border-color:var(--purple)" onclick="toggleGCForm()">'+S.addGC+'</button></div>'
    +'<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>'+S.colCode+'</th><th>'+S.colNameGC+'</th><th>'+S.colType+'</th><th>'+S.colQty+'</th><th>'+S.colUnit+'</th><th>'+S.colPrice+'</th><th>'+S.colTotal+'</th><th>'+S.colNote+'</th><th></th></tr></thead><tbody>';

  var colNameGC='T\u00ean chi ti\u1ebft/c\u1ee5m';

  if(!items.length) html+='<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text3)">'+S.noGC+'</td></tr>';
  items.forEach(function(item,i){
    var tt=item.qty*item.donGia;
    var lb=item.loai==='C\u1ee5m'?{bg:'var(--purple-light)',c:'var(--purple)'}:{bg:'var(--blue-light)',c:'var(--blue)'};
    html+='<tr><td style="color:var(--text3);font-size:12px;font-weight:600">'+esc(item.id)+'</td>'
      +'<td style="font-weight:500">'+esc(item.name)+'</td>'
      +'<td>'+badge(item.loai,lb.bg,lb.c)+'</td>'
      +'<td style="text-align:right;font-weight:600">'+item.qty+'</td>'
      +'<td style="color:var(--text3)">'+esc(item.unit)+'</td>'
      +'<td>'+( item.donGia>0?fmtVND(item.donGia):'—')+'</td>'
      +'<td style="color:var(--green);font-weight:700">'+( tt>0?fmtVND(tt):'—')+'</td>'
      +'<td style="color:var(--text3);font-size:12px">'+esc(item.ghiChu||'—')+'</td>'
      +'<td style="white-space:nowrap"><button class="btn btn-xs" style="margin-right:4px" onclick="editGC('+i+')">&#9999;&#65039;</button><button class="btn btn-xs btn-danger" onclick="delGC('+i+')">&#128465;</button></td></tr>';
  });
  if(items.length) html+='<tr class="tbl-total"><td colspan="6">'+S.total+'</td><td>'+fmtVND(items.reduce(function(s,i){return s+i.qty*i.donGia;},0))+'</td><td colspan="2"></td></tr>';
  html+='</tbody></table></div>';
  return html;}

function toggleAddCumUI(){
  var inp=document.getElementById('newCumName');var btn=document.getElementById('newCumBtn');
  if(!inp)return;var h=inp.style.display==='none';
  inp.style.display=h?'':'none';btn.style.display=h?'':'none';if(h)inp.focus();
}
function toggleGCForm(){var el=document.getElementById('gcForm');if(el)el.style.display=el.style.display==='none'?'block':'none';}

function renderBOM(){
  var p=curBomP();
  var projBtns=STATE.projects.map(function(pr){
    var active=STATE.bomPId===pr.id;
    return '<button onclick="STATE.bomPId='+pr.id+';render()" style="padding:7px 14px;border-radius:var(--radius);border:1.5px solid '+(active?'var(--blue)':'var(--border)')+';background:'+(active?'var(--blue)':'var(--surface)')+';color:'+(active?'#fff':'var(--text2)')+';font-weight:'+(active?700:400)+';font-size:13px">'+esc(pr.name)+'</button>';
  }).join('');
  var html='<div class="card" style="margin-bottom:16px"><div class="card-header" style="flex-wrap:wrap;gap:10px">'
    +'<span style="font-size:13px;font-weight:700;color:var(--text2)">'+S.selectProj+'</span>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'+projBtns+'</div>'
    +'</div></div>';
  if(!p){return html+'<div class="empty-state"><div class="empty-icon">&#128297;</div><div class="empty-title">'+S.noBOM+'</div></div>';}
  html+='<div class="card">'
    +'<div class="card-header"><div style="flex:1"><div style="font-weight:700;font-size:16px">'+esc(p.name)+'</div><div style="font-size:12px;color:var(--text3);margin-top:2px">'+esc(p.client)+'</div></div>'
    +'<div style="display:flex;gap:8px">'
    +'<button class="btn btn-sm" style="background:var(--amber-light);color:var(--amber);border-color:#fde68a" onclick="expVT()">'+S.expVT+'</button>'
    +'<button class="btn btn-sm" style="background:var(--purple-light);color:var(--purple);border-color:#ddd6fe" onclick="expGC()">'+S.expGC+'</button>'
    +'</div></div>'
    +'<div class="card-body">'
    +'<div class="tabs" style="margin-bottom:16px">'
    +'<button class="tab'+(STATE.bomSub==='vattu'?' active':'')+'" onclick="STATE.bomSub=\'vattu\';render()">'+S.tabVT+'</button>'
    +'<button class="tab'+(STATE.bomSub==='giacong'?' active':'')+'" onclick="STATE.bomSub=\'giacong\';render()">'+S.tabGC+'</button>'
    +'</div>'
    +(STATE.bomSub==='vattu'?renderVatTu(p):renderGiaCong(p))
    +'</div></div>';
  return html;}

function render(){
  // Update topbar static text
  document.getElementById('appTitle').textContent=S.appTitle;
  document.getElementById('btnExpTD').textContent=S.btnTD;
  document.getElementById('btnSnap').textContent=S.btnSnap;
  document.getElementById('btnHist').textContent=S.btnHist+(STATE.hist.length?' ('+STATE.hist.length+')':'');
  if(!document.getElementById('syncText').textContent) setSyncUI('connecting');

  var html=renderHistory()+renderMetrics();
  html+='<div class="tabs"><button class="tab'+(STATE.tab==='overview'?' active':'')+'" onclick="STATE.tab=\'overview\';render()">'+S.tabOverview+'</button><button class="tab'+(STATE.tab==='bom'?' active':'')+'" onclick="STATE.tab=\'bom\';render()">'+S.tabBOM+'</button></div>';
  html+=STATE.tab==='overview'?renderOverview():renderBOM();
  html+='<div style="margin-top:32px;text-align:center;font-size:12px;color:var(--text3);padding:16px 0">'+S.footer+'</div>';
  document.getElementById('app').innerHTML=html;
}

render();
