<meta name="apple-mobile-web-app-title" content="Tiến độ TĐH"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:20px 16px 60px}

/* TOPBAR */
.topbar{background:#1e293b;position:sticky;top:0;z-index:100;padding:0 20px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:54px;gap:12px}
.tb-title{font-size:15px;font-weight:700;color:#fff;flex:1}
.sync-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 12px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e}
.sync-dot.off{background:#f59e0b}
.sync-dot.err{background:#ef4444}
#syncTxt{font-size:11px;color:#94a3b8}

/* TABS */
.tabs{display:flex;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:4px;gap:4px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tab{flex:1;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#64748b;background:none;border:none;cursor:pointer;text-align:center;transition:all .15s}
.tab.active{background:#2563eb;color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(37,99,235,.3)}
.tab:hover:not(.active){background:#f1f5f9}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.metric{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.metric-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:6px}
.metric-val{font-size:24px;font-weight:800;line-height:1}

/* CARDS */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:12px;overflow:hidden}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}

/* PROJECT ROW */
.proj-row{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;flex-wrap:wrap}
.proj-detail{padding:4px 20px 18px;border-top:1px solid #f1f5f9}

/* PHASE CARDS */
.phases{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding-top:14px}
.phase-card{border-radius:12px;padding:14px;cursor:pointer;border:2px solid;transition:transform .15s}
.phase-card:hover{transform:translateY(-2px)}

/* PBAR */
.pbar{background:#e2e8f0;border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}

/* TABLES */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#94a3b8;padding:9px 12px;border-bottom:2px solid #e2e8f0;background:#f8fafc;text-align:left;white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f8fafc}
.tbl-total td{background:#eff6ff!important;font-weight:700;color:#1d4ed8}

/* SECTION (CUM) */
.section{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#f8fafc;cursor:pointer;border-bottom:1px solid transparent}
.sec-hdr:hover{background:#f1f5f9}
.sec-hdr.open{border-bottom-color:#e2e8f0}

/* SUMMARY */
.summary{border:2px solid #2563eb;border-radius:12px;overflow:hidden;margin-top:16px}
.summary-hdr{background:#2563eb;padding:11px 16px;color:#fff;font-weight:700;font-size:13px}

/* ADD FORMS */
.add-form{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:16px;margin-bottom:14px}
.add-form-gc{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:12px;padding:16px;margin-bottom:14px}
.add-item-form{background:#eff6ff;border-top:1px solid #bfdbfe;padding:13px 16px;display:none}

/* INPUTS */
input,select,textarea{font-family:inherit;font-size:13px;color:#1e293b;padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#2563eb}
input[type=range]{padding:0;height:4px;accent-color:#2563eb}
.fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#64748b;margin-bottom:4px;display:block}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg6{display:grid;grid-template-columns:2fr .8fr .8fr .8fr 1.2fr 1.5fr;gap:8px}

/* BUTTONS */
button{cursor:pointer;font-family:inherit;font-size:13px}
.btn{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:8px;padding:8px 14px;font-weight:600;transition:all .15s}
.btn:hover{background:#e2e8f0}
.btn-blue{background:#2563eb;color:#fff;border:none}
.btn-blue:hover{background:#1d4ed8}
.btn-green{background:#16a34a;color:#fff;border:none}
.btn-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-red:hover{background:#dc2626;color:#fff}
.btn-purple{background:#7c3aed;color:#fff;border:none}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:3px 9px;font-size:11px;border-radius:6px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{padding:20px 24px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:15px}

/* CONFIRM */
.confirm-box{background:#fff;border-radius:16px;padding:24px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}

/* FILE */
.file-row{display:flex;align-items:center;gap:8px;background:#f8fafc;border-radius:8px;padding:7px 11px;margin-bottom:6px}

/* HIST */
.hist-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:8px;flex-wrap:wrap}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;z-index:999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}

/* INSTALL */
.install-bar{position:fixed;bottom:0;left:0;right:0;background:#1e293b;color:#fff;padding:13px 20px;display:flex;align-items:center;justify-content:space-between;z-index:800;box-shadow:0 -4px 20px rgba(0,0,0,.2)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:#94a3b8}
.empty-icon{font-size:44px;margin-bottom:10px}

@media(max-width:600px){.fg3,.fg2{grid-template-columns:1fr}.fg6{grid-template-columns:1fr 1fr}.phases{grid-template-columns:1fr 1fr}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>

// ── UTILS ─────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtVND(n){return n>0?n.toLocaleString('vi-VN')+'\u20ab':'—';}
function fd(d){if(!d)return '—';var t=new Date(d);return t.getDate()+'/'+(t.getMonth()+1)+'/'+t.getFullYear();}
function wdays(s,e){if(!s||!e)return null;var a=new Date(s),b=new Date(e);if(isNaN(a)||isNaN(b)||b<a)return null;var n=0,c=new Date(a);while(c<=b){var d=c.getDay();if(d&&d<6)n++;c.setDate(c.getDate()+1);}return n;}
function getOv(ph){var v=Object.values(ph);return Math.round(v.reduce(function(a,p){return a+p.progress;},0)/v.length);}
function getDL(d){var df=Math.ceil((new Date(d)-new Date())/86400000);if(df<0)return{t:'Qu\u00e1 h\u1ea1n',c:'#dc2626',b:'#fef2f2'};if(df<=14)return{t:'C\u00f2n '+df+' ng\u00e0y',c:'#d97706',b:'#fffbeb'};return{t:'C\u00f2n '+df+' ng\u00e0y',c:'#16a34a',b:'#f0fdf4'};}
function pb(v,c,h){return '<div class="pbar" style="height:'+(h||6)+'px"><div class="pbar-fill" style="width:'+v+'%;background:'+(c||'#2563eb')+'"></div></div>';}
function bdg(text,bg,color){return '<span class="badge" style="background:'+bg+';color:'+color+'">'+esc(text)+'</span>';}
var IID=300;function uid(){return 'u'+(++IID);}
function nextGC(arr){var n=arr.map(function(i){return parseInt(i.id.replace('GC-',''))||0;});return 'GC-'+String(Math.max.apply(null,[0].concat(n))+1).padStart(3,'0');}

// ── STORAGE ───────────────────────────────────────────────
function lsGet(k){try{var s=localStorage.getItem(k);return s?JSON.parse(s):null;}catch(e){return null;}}
function lsSave(p,h){try{localStorage.setItem(SK,JSON.stringify(p));localStorage.setItem(HK,JSON.stringify(h));localStorage.setItem(SK_INIT,'1');}catch(e){}}
function clone(o){return JSON.parse(JSON.stringify(o));}
function pushH(hist,proj,lb){return [{id:Date.now(),lb:lb,ts:new Date().toLocaleString('vi-VN'),data:clone(proj)}].concat(hist).slice(0,MH);}

   phases:{concept:{status:'done',progress:100,assignee:'Nguy\u1ec5n V\u0103n A',notes:'',files:[],startDate:'2026-03-01',endDate:'2026-03-15'},'3d':{status:'done',progress:100,assignee:'Tr\u1ea7n Th\u1ecb B',notes:'',files:[],startDate:'2026-03-16',endDate:'2026-04-10'},'2d':{status:'in-progress',progress:65,assignee:'L\u00ea V\u0103n C',notes:'',files:[],startDate:'2026-04-01',endDate:'2026-05-15'},bom:{status:'in-progress',progress:40,assignee:'Ph\u1ea1m Th\u1ecb D',notes:'',files:[],startDate:'2026-04-15',endDate:'2026-06-20'}},
   bom:{cumList:[{id:'CUM-001',name:'C\u1ee5m b\u0103ng t\u1ea3i ch\u00ednh',items:[{id:'i1',name:'\u0110\u1ed9ng c\u01a1 servo 750W',qty:2,unit:'c\u00e1i',status:'\u0110\u00e3 x\u00e1c nh\u1eadn',supplier:'Mitsubishi',price:4500000},{id:'i2',name:'Bi\u1ebfn t\u1ea7n 5.5kW',qty:1,unit:'c\u00e1i',status:'\u0110\u00e3 x\u00e1c nh\u1eadn',supplier:'Siemens',price:3200000}]},{id:'CUM-002',name:'C\u1ee5m \u0111i\u1ec1u khi\u1ec3n',items:[{id:'i4',name:'PLC S7-1500',qty:1,unit:'b\u1ed9',status:'\u0110\u00e3 \u0111\u1eb7t h\u00e0ng',supplier:'Siemens',price:15000000},{id:'i5',name:'HMI 15 inch',qty:1,unit:'c\u00e1i',status:'\u0110\u00e3 \u0111\u1eb7t h\u00e0ng',supplier:'Weintek',price:6500000}]}],giaCong:[{id:'GC-001',name:'Khung th\u00e9p h\u1ed9p 60x60',qty:120,unit:'m',loai:'Chi ti\u1ebft',donGia:85000,ghiChu:'H\u00e0n tinh'}]}},

  {id:3,name:'Robot h\u00e0n t\u1ef1 \u0111\u1ed9ng',client:'H\u00f2a Ph\u00e1t',deadline:'2026-05-20',

function initProjs(){var s=lsGet(SK);if(s!==null)return s;if(!localStorage.getItem(SK_INIT)){localStorage.setItem(SK_INIT,'1');return INIT;}return [];}

// ── STATE ─────────────────────────────────────────────────

  projects:initProjs(),
  hist:lsGet(HK)||[],
  tab:'overview',

  filter:'all',

// ── FIREBASE ──────────────────────────────────────────────
var db=null,_on=false,_ft=null;
try{
  firebase.initializeApp({apiKey:'AIzaSyAzBcUvQRBgt7ITBy7tpqWYcBqBNgFofRY',authDomain:'quan-ly-du-an-da802.firebaseapp.com',databaseURL:'https://quan-ly-du-an-da802-default-rtdb.asia-southeast1.firebasedatabase.app',projectId:'quan-ly-du-an-da802',storageBucket:'quan-ly-du-an-da802.firebasestorage.app',messagingSenderId:'283670804509',appId:'1:283670804509:web:da33006c0c640c578c6ef4'});
  db=firebase.database();
  db.ref('.info/connected').on('value',function(snap){_on=snap.val()===true;syncUI(_on?'ok':'off');});
  db.ref('atpm/projects').on('value',function(snap){var d=snap.val();if(!d)return;if(JSON.stringify(d)!==JSON.stringify(S.projects)){S.projects=d;lsSave(S.projects,S.hist);render();}syncUI('ok');});
  db.ref('atpm/history').on('value',function(snap){var d=snap.val();if(d&&JSON.stringify(d)!==JSON.stringify(S.hist))S.hist=d;});
}catch(e){console.warn('FB',e);}

function fbWrite(lb){
  if(_ft)clearTimeout(_ft);syncUI('saving');
  _ft=setTimeout(function(){
    lsSave(S.projects,S.hist);
    if(!db||!_on){syncUI('off');return;}
    db.ref('atpm/projects').set(S.projects);
    if(lb){S.hist=pushH(S.hist,S.projects,lb);db.ref('atpm/history').set(S.hist);}
    syncUI('ok');
  },800);
}
function save(lb){fbWrite(lb);}
function syncUI(st){
  var d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');if(!d)return;
  d.className='sync-dot'+(st==='off'?' off':st==='err'?' err':'');
  t.textContent=st==='ok'?'\u0110\u00e3 \u0111\u1ed3ng b\u1ed9':st==='saving'?'\u0110ang l\u01b0u...':st==='off'?'Offline':'L\u1ed7i';
}

// ── CONFIRM ───────────────────────────────────────────────
var _cb=null;
function showConfirm(msg,cb){_cb=cb;document.getElementById('cMsg').textContent=msg;document.getElementById('cWrap').style.display='flex';}
function cOK(){document.getElementById('cWrap').style.display='none';if(_cb){_cb();_cb=null;}}
function cCancel(){document.getElementById('cWrap').style.display='none';_cb=null;}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}

// ── EXPORTS ───────────────────────────────────────────────
function dlBlob(c,type,fn){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:type}));a.download=fn;document.body.appendChild(a);a.click();a.remove();}
function dlCSV(rows,fn){dlBlob('\uFEFF'+rows.map(function(r){return r.map(function(c){return '"'+String(c==null?'':c).replace(/"/g,'""')+'"';}).join(',');}).join('\n'),'text/csv;charset=utf-8',fn);}
function expTD(){var rows=[['D\u1ef1 \u00e1n','KH','Deadline','T\u1ed5ng%','Concept','3D','2D','BOM']];S.projects.forEach(function(p){var o=getOv(p.phases);rows.push([p.name,p.client,p.deadline,o+'%',p.phases.concept.progress+'% '+ST[p.phases.concept.status].lb,p.phases['3d'].progress+'% '+ST[p.phases['3d'].status].lb,p.phases['2d'].progress+'% '+ST[p.phases['2d'].status].lb,p.phases.bom.progress+'% '+ST[p.phases.bom.status].lb]);});dlCSV(rows,'TienDo.csv');}
function expVT(){var p=curP();if(!p)return;var rows=[[p.name],[p.client],[],[]];p.bom.cumList.forEach(function(c){rows.push(['CUM: '+c.name],['Ten','SL','DV','NCC','Status','Gia','Thanh tien']);c.items.forEach(function(i){rows.push([i.name,i.qty,i.unit,i.supplier,i.status,i.price||'',i.price?i.qty*i.price:'']);});rows.push([]);});var sm={};p.bom.cumList.reduce(function(a,c){return a.concat(c.items);},[]).forEach(function(i){var k=i.name.toLowerCase();if(!sm[k])sm[k]={name:i.name,qty:0,price:i.price,unit:i.unit};sm[k].qty+=i.qty;if(i.price>0&&!sm[k].price)sm[k].price=i.price;});rows.push(['TONG HOP'],['Ten','Tong SL','DV','Gia','Thanh tien']);Object.values(sm).forEach(function(r){rows.push([r.name,r.qty,r.unit,r.price||'',r.price?r.qty*r.price:'']);});dlCSV(rows,'VatTu_'+p.name+'.csv');}
function expGC(){var p=curP();if(!p)return;var rows=[['Ma','Ten','Loai','SL','DV','Don gia','Thanh tien','Ghi chu']];p.bom.giaCong.forEach(function(i){rows.push([i.id,i.name,i.loai,i.qty,i.unit,i.donGia,i.qty*i.donGia,i.ghiChu]);});dlCSV(rows,'GiaCong_'+p.name+'.csv');}
function expJSON(){dlBlob(JSON.stringify(S.projects,null,2),'application/json','backup_'+Date.now()+'.json');}
function impJSON(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(!Array.isArray(d))throw 0;S.projects=d;save('Nh\u1eadp file: '+f.name);render();toast('Nh\u1eadp th\u00e0nh c\u00f4ng!');}catch(x){alert('File kh\u00f4ng h\u1ee3p l\u1ec7.');}};r.readAsText(f);input.value='';}
function snapshot(){save('Snapshot '+new Date().toLocaleString('vi-VN'));toast('\u0110\u00e3 l\u01b0u phi\u00ean b\u1ea3n!');}

// ── HELPERS ───────────────────────────────────────────────
function findP(id){return S.projects.find(function(p){return p.id===id;});}
function curP(){return S.projects.find(function(p){return p.id===S.bomPId;});}

// ── PHASE MODAL ───────────────────────────────────────────
var PM={};
function openPM(pid,phase){var proj=findP(pid);if(!proj)return;PM={pid:pid,phase:phase,data:clone(proj.phases[phase])};renderPM();}
function renderPM(){
  var d=PM.data,sc=ST[d.status],proj=findP(PM.pid),wd=wdays(d.startDate,d.endDate);
  var files=d.files||[];
  var fHtml=files.length===0?'<div style="text-align:center;padding:14px;border:2px dashed #e2e8f0;border-radius:8px;color:#94a3b8;font-size:13px">Ch\u01b0a c\u00f3 t\u00e0i li\u1ec7u</div>':files.map(function(f,i){
    var icon=f.type==='link'?'&#128279;':f.fileType&&f.fileType.indexOf('image/')===0?'&#128444;&#65039;':'&#128196;';
    var btns='';
    if(f.type==='link')btns+='<a href="'+esc(f.url)+'" target="_blank" class="btn btn-xs" style="background:#eff6ff;color:#2563eb;text-decoration:none">M\u1edf &#8599;</a> ';
    if(f.type==='file'&&f.dataUrl&&(f.fileType.indexOf('image/')===0||f.fileType==='application/pdf'))btns+='<button class="btn btn-xs" style="background:#f0fdf4;color:#16a34a" onclick="viewF('+i+')">Xem &#128065;</button> ';
    if(f.type==='file'&&f.dataUrl)btns+='<a href="'+f.dataUrl+'" download="'+esc(f.name)+'" class="btn btn-xs" style="background:#fffbeb;color:#d97706;text-decoration:none">T\u1ea3i &#11015;</a> ';
    btns+='<button class="btn btn-xs btn-red" onclick="rmF('+i+')">&#10005;</button>';
    return '<div class="file-row"><span style="font-size:15px">'+icon+'</span><span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(f.name)+'</span><div style="display:flex;gap:4px">'+btns+'</div></div>';
  }).join('');
  var stOpts=Object.entries(ST).map(function(kv){return '<option value="'+kv[0]+'"'+(d.status===kv[0]?' selected':'')+'>'+kv[1].lb+'</option>';}).join('');
  var html='<div class="modal-bg" onclick="if(event.target===this)closePM()">'
    +'<div class="modal"><div class="modal-hdr" style="background:'+sc.co+'">'
    +'<div><div style="color:#fff;font-weight:800;font-size:16px">'+PIC[PM.phase]+' '+PLB[PM.phase]+'</div><div style="color:rgba(255,255,255,.75);font-size:13px;margin-top:2px">'+esc(proj.name)+'</div></div>'
    +'<button style="background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:8px;font-size:16px" onclick="closePM()">&#10005;</button></div>'
    +'<div class="modal-body">'
    +'<div class="fg2"><div><label class="fl">Tr\u1ea1ng th\u00e1i</label><select onchange="pmSet(\'status\',this.value)">'+stOpts+'</select></div>'
    +'<div><label class="fl">Ng\u01b0\u1eddi ph\u1ee5 tr\u00e1ch</label><input value="'+esc(d.assignee)+'" oninput="pmSet(\'assignee\',this.value)"></div></div>'
    +'<div class="fg2"><div><label class="fl">Ng\u00e0y b\u1eaft \u0111\u1ea7u</label><input type="date" value="'+esc(d.startDate||'')+'" onchange="pmSet(\'startDate\',this.value)"></div>'
    +'<div><label class="fl">Ng\u00e0y k\u1ebft th\u00fac</label><input type="date" value="'+esc(d.endDate||'')+'" onchange="pmSet(\'endDate\',this.value)"></div></div>'
    +(wd!==null?'<div style="background:#eff6ff;color:#2563eb;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700">&#9201; '+wd+' ng\u00e0y l\u00e0m vi\u1ec7c (kh\u00f4ng t\u00ednh T7, CN)</div>':'')
    +'<div><div style="display:flex;justify-content:space-between;margin-bottom:8px"><label class="fl" style="margin:0">Ti\u1ebfn \u0111\u1ed9</label><span style="font-size:15px;font-weight:800;color:'+sc.co+'" id="pmPct">'+d.progress+'%</span></div>'
    +'<input type="range" min="0" max="100" step="5" value="'+d.progress+'" oninput="pmSet(\'progress\',+this.value);document.getElementById(\'pmPct\').textContent=this.value+\'%\'" style="accent-color:'+sc.co+'">'
    +'<div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-top:3px"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div></div>'
    +'<div><label class="fl">Ghi ch\u00fa</label><textarea rows="3" oninput="pmSet(\'notes\',this.value)" style="resize:vertical">'+esc(d.notes)+'</textarea></div>'
    +'<div><label class="fl" style="margin-bottom:10px">T\u00e0i li\u1ec7u / B\u1ea3n v\u1ebd</label>'
    +'<div style="display:flex;gap:8px;margin-bottom:8px"><input id="pmLink" placeholder="D\u00e1n link b\u1ea3n v\u1ebd ho\u1eb7c \u0111\u01b0\u1eddng d\u1eabn file..." style="flex:1"><button class="btn btn-sm btn-blue" onclick="addLink()">+ Link</button></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:10px"><input type="file" id="pmFile" style="display:none" accept=".pdf,.png,.jpg,.jpeg,.dwg,.xlsx,.stp" onchange="addFile(this)"><button class="btn btn-sm" onclick="document.getElementById(\'pmFile\').click()">\u21e9 \u0110\u00ednh k\u00e8m file</button><span style="font-size:11px;color:#94a3b8;align-self:center">PDF, PNG, DWG...</span></div>'
    +fHtml+'</div>'
    +'<div style="display:flex;gap:10px"><button onclick="savePM()" style="flex:1;padding:12px;border-radius:12px;background:'+sc.co+';color:#fff;font-weight:700;font-size:14px;border:none">L\u01b0u thay \u0111\u1ed5i</button>'
    +'<button class="btn" onclick="closePM()" style="flex:1;padding:12px;border-radius:12px;font-size:14px">H\u1ee7y</button></div>'
    +'</div></div></div>';
  document.getElementById('pmWrap').innerHTML=html;
}
function pmSet(k,v){PM.data[k]=v;}
function addLink(){var el=document.getElementById('pmLink');var v=el.value.trim();if(!v)return;(PM.data.files=PM.data.files||[]).push({type:'link',name:v,url:v});el.value='';renderPM();}
function addFile(input){var f=input.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){(PM.data.files=PM.data.files||[]).push({type:'file',name:f.name,fileType:f.type,dataUrl:e.target.result});renderPM();};r.readAsDataURL(f);}
function rmF(i){PM.data.files.splice(i,1);renderPM();}
function viewF(i){var f=PM.data.files[i];if(!f||!f.dataUrl)return;var w=window.open('','_blank');w.document.write('<html><body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh">'+(f.fileType.indexOf('image/')===0?'<img src="'+f.dataUrl+'" style="max-width:100%;max-height:100vh">':'<iframe src="'+f.dataUrl+'" style="width:100vw;height:100vh;border:none"></iframe>')+'</body></html>');}
function savePM(){var proj=findP(PM.pid);if(!proj)return;proj.phases[PM.phase]=clone(PM.data);save(PLB[PM.phase]+' \u2014 '+proj.name);closePM();render();}
function closePM(){document.getElementById('pmWrap').innerHTML='';}

// ── ACTIONS ───────────────────────────────────────────────
function renameP(id,v){var p=findP(id);if(p)p.name=v;}
function editCl(id,v){var p=findP(id);if(p)p.client=v;}
function editDL(id,v){var p=findP(id);if(p){p.deadline=v;save('C\u1eadp nh\u1eadt deadline');render();}}
function delProj(id){showConfirm('X\u00f3a d\u1ef1 \u00e1n n\u00e0y? To\u00e0n b\u1ed9 BOM s\u1ebd b\u1ecb x\u00f3a.',function(){S.projects=S.projects.filter(function(p){return p.id!==id;});if(S.selId===id)S.selId=null;if(S.bomPId===id)S.bomPId=null;save('X\u00f3a d\u1ef1 \u00e1n');render();});}
function showAddProject(){S.showAddProj=true;render();setTimeout(function(){var el=document.getElementById('np_name');if(el)el.focus();},50);}
function hideAddProject(){S.showAddProj=false;render();}
function addProject(){
  var nm=document.getElementById('np_name');var cl=document.getElementById('np_client');var dl=document.getElementById('np_deadline');
  if(!nm||!nm.value.trim())return;
  var mid=S.projects.reduce(function(m,p){return Math.max(m,p.id);},0);
  S.projects.push({id:mid+1,name:nm.value.trim(),client:cl.value.trim()||'—',deadline:dl.value||'',
    phases:{concept:{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},'3d':{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},'2d':{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},bom:{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''}},
    bom:{cumList:[],giaCong:[]}});
  S.showAddProj=false;save('Th\u00eam d\u1ef1 \u00e1n: '+nm.value.trim());render();toast('T\u1ea1o d\u1ef1 \u00e1n th\u00e0nh c\u00f4ng!');
}
function toggleSel(id){S.selId=S.selId===id?null:id;render();}
function goBOM(id){S.bomPId=id;S.tab='bom';render();}
function toggleCum(id){S.openCums[id]=S.openCums[id]===false;render();}
function addCum(){var el=document.getElementById('newCumName');if(!el||!el.value.trim())return;var p=curP();if(!p)return;p.bom.cumList.push({id:'CUM-'+String(p.bom.cumList.length+1).padStart(3,'0'),name:el.value.trim(),items:[]});save('Th\u00eam c\u1ee5m');render();}
function delCum(ci){showConfirm('X\u00f3a c\u1ee5m n\u00e0y?',function(){var p=curP();if(!p)return;p.bom.cumList.splice(ci,1);save('X\u00f3a c\u1ee5m');render();});}
function renameCum(ci,v){var p=curP();if(!p)return;p.bom.cumList[ci].name=v;}
function toggleAIF(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}
function toggleAddCumUI(){var inp=document.getElementById('newCumName');var btn=document.getElementById('newCumBtn');if(!inp)return;var h=inp.style.display==='none';inp.style.display=h?'':'none';if(btn)btn.style.display=h?'':'none';if(h)inp.focus();}
function addItem(ci){
  var g=function(id){return document.getElementById(id);};
  var nm=g('ni_name'+ci);if(!nm||!nm.value.trim())return;
  var p=curP();if(!p)return;
  p.bom.cumList[ci].items.push({id:uid(),name:nm.value.trim(),qty:+(g('ni_qty'+ci).value)||1,unit:g('ni_unit'+ci).value,supplier:g('ni_ncc'+ci).value,price:+(g('ni_price'+ci).value)||0,status:g('ni_status'+ci).value});
  save('Th\u00eam linh ki\u1ec7n');render();
}
function delItem(ci,ii){showConfirm('X\u00f3a linh ki\u1ec7n n\u00e0y?',function(){var p=curP();if(!p)return;p.bom.cumList[ci].items.splice(ii,1);save('X\u00f3a linh ki\u1ec7n');render();});}
function editItem(ci,ii){var p=curP();if(!p)return;var it=p.bom.cumList[ci].items[ii];var nm=prompt('T\u00ean:',it.name);if(nm===null)return;var qty=prompt('SL:',it.qty);if(qty===null)return;var pr=prompt('\u0110\u01a1n gi\u00e1:',it.price);if(pr===null)return;var sup=prompt('NCC:',it.supplier);if(sup===null)return;it.name=nm;it.qty=+qty||1;it.price=+pr||0;it.supplier=sup;save('S\u1eeda linh ki\u1ec7n');render();}
function searchPrice(nm){window.open('https://www.google.com/search?q='+encodeURIComponent(nm+' gi\u00e1 b\u00e1n Vi\u1ec7t Nam'),'_blank');}
function toggleGCForm(){var el=document.getElementById('gcForm');if(el)el.style.display=el.style.display==='none'?'block':'none';}
function addGC(){var g=function(id){return document.getElementById(id);};var nm=g('gc_name');if(!nm||!nm.value.trim())return;var p=curP();if(!p)return;p.bom.giaCong.push({id:nextGC(p.bom.giaCong),name:nm.value.trim(),loai:g('gc_loai').value,qty:+(g('gc_qty').value)||1,unit:g('gc_unit').value,donGia:+(g('gc_donGia').value)||0,ghiChu:g('gc_ghiChu').value});save('Th\u00eam gia c\u00f4ng');render();}
function delGC(i){showConfirm('X\u00f3a h\u1ea1ng m\u1ee5c?',function(){var p=curP();if(!p)return;p.bom.giaCong.splice(i,1);save('X\u00f3a gia c\u00f4ng');render();});}
function editGC(i){var p=curP();if(!p)return;var it=p.bom.giaCong[i];var nm=prompt('T\u00ean:',it.name);if(nm===null)return;var qty=prompt('SL:',it.qty);if(qty===null)return;var dg=prompt('\u0110\u01a1n gi\u00e1:',it.donGia);if(dg===null)return;var gh=prompt('Ghi ch\u00fa:',it.ghiChu);if(gh===null)return;it.name=nm;it.qty=+qty||1;it.donGia=+dg||0;it.ghiChu=gh;save('S\u1eeda GC');render();}
function dlHist(i){var e=S.hist[i];var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(e.data,null,2)],{type:'application/json'}));a.download='backup_v'+(S.hist.length-i)+'.json';document.body.appendChild(a);a.click();a.remove();}
function restoreHist(i){showConfirm('Kh\u00f4i ph\u1ee5c v\u1ec1 phi\u00ean b\u1ea3n n\u00e0y?',function(){S.projects=clone(S.hist[i].data);save('Kh\u00f4i ph\u1ee5c: '+S.hist[i].lb);render();toast('Kh\u00f4i ph\u1ee5c th\u00e0nh c\u00f4ng!');});}
function delHist(i){showConfirm('X\u00f3a phi\u00ean b\u1ea3n n\u00e0y kh\u1ecfi l\u1ecbch s\u1eed?',function(){S.hist.splice(i,1);lsSave(S.projects,S.hist);if(db&&_on)db.ref('atpm/history').set(S.hist);render();toast('\u0110\u00e3 x\u00f3a phi\u00ean b\u1ea3n!');});}
function clearAllHist(){showConfirm('X\u00f3a to\u00e0n b\u1ed9 l\u1ecbch s\u1eed? Kh\u00f4ng th\u1ec3 ho\u00e0n t\u00e1c.',function(){S.hist=[];lsSave(S.projects,S.hist);if(db&&_on)db.ref('atpm/history').set([]);render();toast('\u0110\u00e3 x\u00f3a to\u00e0n b\u1ed9 l\u1ecbch s\u1eed!');});}

// ── RENDER ────────────────────────────────────────────────
function renderMetrics(){
  var done=S.projects.reduce(function(a,p){return a+Object.values(p.phases).filter(function(ph){return ph.status==='done';}).length;},0);
  var total=S.projects.length*4||1;
  var inp=S.projects.reduce(function(a,p){return a+Object.values(p.phases).filter(function(ph){return ph.status==='in-progress';}).length;},0);
  return '<div class="metrics">'
    +[{l:'T\u1ed5ng d\u1ef1 \u00e1n',v:S.projects.length,c:'#2563eb'},{l:'Phase ho\u00e0n th\u00e0nh',v:done+'/'+total,c:'#16a34a'},{l:'\u0110ang th\u1ef1c hi\u1ec7n',v:inp,c:'#d97706'},{l:'T\u1ef7 l\u1ec7 HT',v:Math.round(done/total*100)+'%',c:'#7c3aed'}]
    .map(function(m){return '<div class="metric"><div class="metric-lbl">'+m.l+'</div><div class="metric-val" style="color:'+m.c+'">'+m.v+'</div></div>';}).join('')+'</div>';
}

function renderHistory(){
  if(!S.showHist) return '';
  var rows=S.hist.length===0?'<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px">Ch\u01b0a c\u00f3 l\u1ecbch s\u1eed. Nh\u1ea5n "L\u01b0u phi\u00ean b\u1ea3n" \u0111\u1ec3 t\u1ea1o b\u1ea3n l\u01b0u.</div>'
    :S.hist.map(function(e,i){
      return '<div class="hist-row">'
        +'<div style="width:28px;height:28px;border-radius:50%;background:'+(i===0?'#2563eb':'#e2e8f0')+';color:'+(i===0?'#fff':'#475569')+';display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0">'+(S.hist.length-i)+'</div>'
        +'<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e.lb)+'</div><div style="font-size:11px;color:#94a3b8;margin-top:2px">'+esc(e.ts)+'</div></div>'
        +(i===0?'<span class="badge" style="background:#eff6ff;color:#2563eb;flex-shrink:0">M\u1edbi nh\u1ea5t</span>':'')
        +'<div style="display:flex;gap:6px;flex-shrink:0"><button class="btn btn-xs" onclick="dlHist('+i+')">\u2193 T\u1ea3i JSON</button><button class="btn btn-xs" style="background:#fffbeb;color:#d97706;border-color:#fde68a" onclick="restoreHist('+i+')">\u21a9 Kh\u00f4i ph\u1ee5c</button><button class="btn btn-xs btn-red" onclick="delHist('+i+')">&#10005;</button></div>'
        +'</div>';
    }).join('');
  return '<div class="card" style="margin-bottom:20px"><div style="padding:14px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between"><span style="font-weight:700;font-size:14px">&#128338; L\u1ecbch s\u1eed thay \u0111\u1ed5i</span><span class="badge" style="background:#f1f5f9;color:#64748b">T\u1ed1i \u0111a '+MH+' phi\u00ean</span></div>'
    +'<div style="padding:14px 18px">'+rows
    +'<div style="margin-top:14px;padding-top:12px;border-top:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    +'<span style="font-size:12px;color:#94a3b8;flex:1">Nh\u1eadp file JSON \u0111\u1ec3 kh\u00f4i ph\u1ee5c t\u1eeb backup:</span>'
    +'<input type="file" id="impInput" accept=".json" style="display:none" onchange="impJSON(this)">'
    +'<button class="btn btn-sm" onclick="document.getElementById(\'impInput\').click()">\u2191 Nh\u1eadp JSON</button>'
    +'<button class="btn btn-sm btn-green" onclick="expJSON()">\u2193 Xu\u1ea5t JSON</button>'
    +(S.hist.length?'<button class="btn btn-sm btn-red" onclick="clearAllHist()">X\u00f3a t\u1ea5t c\u1ea3</button>':'')
    +'</div></div></div>';
}

function renderOverview(){
  var stOpts='<option value="all"'+(S.filter==='all'?' selected':'')+'>T\u1ea5t c\u1ea3</option>'
    +Object.entries(ST).map(function(kv){return '<option value="'+kv[0]+'"'+(S.filter===kv[0]?' selected':'')+'>'+kv[1].lb+'</option>';}).join('');
  var filtered=S.filter==='all'?S.projects:S.projects.filter(function(p){return Object.values(p.phases).some(function(ph){return ph.status===S.filter;});});

  var html='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">'
    +'<select onchange="S.filter=this.value;render()" style="width:auto;padding:8px 12px;border-radius:8px">'+stOpts+'</select>'
    +'<button class="btn btn-sm btn-blue" onclick="showAddProject()" style="margin-left:auto">+ Th\u00eam d\u1ef1 \u00e1n</button>'
    +'</div>';

  if(S.showAddProj){
    html+='<div class="add-form"><div style="font-size:14px;font-weight:700;color:#2563eb;margin-bottom:12px">D\u1ef1 \u00e1n m\u1edbi</div>'
      +'<div class="fg3" style="margin-bottom:10px">'
      +'<div><label class="fl">T\u00ean d\u1ef1 \u00e1n *</label><input id="np_name" placeholder="Nh\u1eadp t\u00ean..."></div>'
      +'<div><label class="fl">Kh\u00e1ch h\u00e0ng</label><input id="np_client" placeholder="T\u00ean KH..."></div>'
      +'<div><label class="fl">Deadline</label><input type="date" id="np_deadline"></div>'
      +'</div><div style="display:flex;gap:8px"><button class="btn btn-sm btn-blue" onclick="addProject()">T\u1ea1o d\u1ef1 \u00e1n</button><button class="btn btn-sm" onclick="hideAddProject()">H\u1ee7y</button></div></div>';
  }

  if(!filtered.length){
    html+='<div class="empty card"><div class="empty-icon">&#128203;</div><div style="font-weight:600;color:#475569;margin-bottom:4px">Ch\u01b0a c\u00f3 d\u1ef1 \u00e1n</div><div style="font-size:13px">Nh\u1ea5n "+ Th\u00eam d\u1ef1 \u00e1n" \u0111\u1ec3 b\u1eaft \u0111\u1ea7u</div></div>';
    return html;
  }

  filtered.forEach(function(proj){
    var ov=getOv(proj.phases),dl=getDL(proj.deadline),isO=S.selId===proj.id;
    html+='<div class="card">';
    html+='<div class="proj-row" onclick="toggleSel('+proj.id+')">';
    html+='<div style="flex:1;min-width:180px">';
    if(isO){
      html+='<input value="'+esc(proj.name)+'" onclick="event.stopPropagation()" oninput="renameP('+proj.id+',this.value)" style="font-weight:700;font-size:15px;border:none;border-bottom:2px solid #2563eb;background:transparent;padding:2px 0;width:100%;outline:none">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">'
        +'<span style="font-size:11px;color:#94a3b8;font-weight:600">KH:</span><input value="'+esc(proj.client)+'" onclick="event.stopPropagation()" oninput="editCl('+proj.id+',this.value)" style="font-size:12px;border:none;border-bottom:1px solid #e2e8f0;background:transparent;padding:1px 4px;color:#475569;min-width:100px">'
        +'<span style="font-size:11px;color:#94a3b8;font-weight:600">DL:</span><input type="date" value="'+esc(proj.deadline||'')+'" onclick="event.stopPropagation()" onchange="editDL('+proj.id+',this.value)" style="font-size:12px;border:none;border-bottom:1px solid #e2e8f0;background:transparent;padding:1px 4px;color:#475569">'
        +'</div>';
    } else {
      html+='<div style="font-weight:700;font-size:15px">'+esc(proj.name)+'</div>';
      html+='<div style="font-size:12px;color:#94a3b8;margin-top:3px">'+esc(proj.client)+'</div>';
    }
    html+='</div>';
    html+='<span class="badge" style="background:'+dl.b+';color:'+dl.c+';flex-shrink:0">'+dl.t+'</span>';
    html+='<div style="min-width:110px;flex-shrink:0"><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Ti\u1ebfn \u0111\u1ed9 '+ov+'%</div>'+pb(ov,ov>=80?'#16a34a':ov>=50?'#2563eb':'#d97706',7)+'</div>';
    html+='<span style="font-size:16px;color:#94a3b8;display:inline-block;transform:'+(isO?'rotate(180deg)':'none')+';transition:transform .2s">&#9660;</span>';
    html+='</div>';

    if(isO){
      html+='<div class="proj-detail">';
      html+='<div class="phases">';
      ['concept','3d','2d','bom'].forEach(function(ph){
        var data=proj.phases[ph],sc=ST[data.status],wd=wdays(data.startDate,data.endDate);
        html+='<div class="phase-card" style="background:'+sc.bg+';border-color:'+sc.bo+'" onclick="openPM('+proj.id+',\''+ph+'\')">'
          +'<div style="font-size:18px;margin-bottom:6px">'+PIC[ph]+'</div>'
          +'<div style="font-size:12px;font-weight:700;color:'+sc.dk+';margin-bottom:7px">'+PLB[ph]+'</div>'
          +pb(data.progress,sc.co,5)
          +'<div style="font-size:18px;font-weight:800;color:'+sc.dk+';margin-top:5px">'+data.progress+'%</div>'
          +'<div style="font-size:10px;font-weight:700;color:'+sc.co+';margin-top:2px">'+sc.lb+'</div>'
          +'<div style="font-size:11px;color:#64748b;margin-top:3px">'+esc(data.assignee||'—')+'</div>'
          +((data.startDate||data.endDate)?'<div style="font-size:10px;color:'+sc.dk+';margin-top:7px;padding-top:7px;border-top:1.5px solid '+sc.bo+'">'+fd(data.startDate)+' \u2192 '+fd(data.endDate)+(wd?'<br><span style="font-weight:700;color:'+sc.co+'">&#9201; '+wd+' ng\u00e0y LV</span>':'')+'</div>':'')
          +((data.files||[]).length>0?'<div style="margin-top:5px;font-size:10px;font-weight:700;color:'+sc.co+'">&#128206; '+(data.files.length)+' t\u00e0i li\u1ec7u</div>':'')
          +'</div>';
      });
      html+='</div>';
      html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px">'
        +'<span style="font-size:12px;color:#94a3b8">Click v\u00e0o phase \u0111\u1ec3 c\u1eadp nh\u1eadt ti\u1ebfn \u0111\u1ed9 v\u00e0 \u0111\u00ednh k\u00e8m t\u00e0i li\u1ec7u</span>'
        +'<div style="display:flex;gap:8px"><button class="btn btn-sm btn-blue" onclick="goBOM('+proj.id+')">Xem BOM \u2192</button>'
        +'<button class="btn btn-sm btn-red" onclick="delProj('+proj.id+')">X\u00f3a d\u1ef1 \u00e1n</button></div></div>';
      html+='</div>';
    }
    html+='</div>';
  });
  return html;
}

function renderVT(p){
  var html='<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center">'
    +'<button class="btn btn-sm btn-blue" onclick="toggleAddCumUI()">+ Th\u00eam c\u1ee5m</button>'
    +'<input id="newCumName" placeholder="T\u00ean c\u1ee5m..." style="width:auto;min-width:180px;display:none">'
    +'<button id="newCumBtn" class="btn btn-sm btn-blue" onclick="addCum()" style="display:none">T\u1ea1o</button>'
    +'</div>';

  p.bom.cumList.forEach(function(cum,ci){
    var isO=S.openCums[cum.id]!==false;
    var tot=cum.items.reduce(function(s,i){return s+i.qty*(i.price||0);},0);
    var fid='aif_'+ci;
    html+='<div class="section">';
    html+='<div class="sec-hdr'+(isO?' open':'')+'" onclick="toggleCum(\''+cum.id+'\')">'
      +'<span style="font-size:11px;color:#94a3b8;display:inline-block;transform:'+(isO?'rotate(90deg)':'none')+';transition:transform .2s">&#9654;</span>'
      +'<div style="flex:1"><input value="'+esc(cum.name)+'" onclick="event.stopPropagation()" oninput="renameCum('+ci+',this.value)" style="background:none;border:none;font-size:13px;font-weight:700;color:#1e293b;width:100%;outline:none;padding:0">'
      +'<span style="font-size:11px;color:#94a3b8"> \u00b7 '+cum.items.length+' linh ki\u1ec7n'+(tot>0?' \u00b7 <b style="color:#16a34a">'+fmtVND(tot)+'</b>':'')+'</span></div>'
      +'<button class="btn btn-xs" style="background:#eff6ff;color:#2563eb;border-color:#bfdbfe" onclick="event.stopPropagation();toggleAIF(\''+fid+'\')">+ Linh ki\u1ec7n</button>'
      +'<button class="btn btn-xs btn-red" onclick="event.stopPropagation();delCum('+ci+')">&#128465;</button>'
      +'</div>';

    html+='<div class="add-item-form" id="'+fid+'">'
      +'<div style="font-size:11px;font-weight:700;color:#2563eb;margin-bottom:8px">Th\u00eam linh ki\u1ec7n v\u00e0o: '+esc(cum.name)+'</div>'
      +'<div class="fg6" style="margin-bottom:8px">';
    [['ni_name'+ci,'T\u00ean *','text',''],['ni_qty'+ci,'SL','number','1'],['ni_unit'+ci,'DV','sel-unit',''],['ni_ncc'+ci,'NCC','text',''],['ni_price'+ci,'Gi\u00e1','number','0'],['ni_status'+ci,'Status','sel-st','']].forEach(function(r){
      html+='<div><div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:3px">'+r[1]+'</div>';
      if(r[2]==='sel-unit') html+='<select id="'+r[0]+'">'+BUNT.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>';
      else if(r[2]==='sel-st') html+='<select id="'+r[0]+'">'+BSTS.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>';
      else html+='<input type="'+(r[2]==='number'?'number':'text')+'" id="'+r[0]+'" value="'+r[3]+'">';
      html+='</div>';
    });
    html+='</div><div style="display:flex;gap:8px"><button class="btn btn-sm btn-blue" onclick="addItem('+ci+')">Th\u00eam</button><button class="btn btn-sm" onclick="toggleAIF(\''+fid+'\')">H\u1ee7y</button></div></div>';

    if(isO){
      if(!cum.items.length){html+='<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px">Ch\u01b0a c\u00f3 linh ki\u1ec7n</div>';}
      else{
        html+='<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>M\u00e3</th><th>T\u00ean v\u1eadt t\u01b0</th><th>NCC</th><th>SL</th><th>\u0110V</th><th>Tr\u1ea1ng th\u00e1i</th><th>\u0110\u01a1n gi\u00e1</th><th></th></tr></thead><tbody>';
        cum.items.forEach(function(item,ii){
          html+='<tr>'
            +'<td style="color:#94a3b8;font-size:11px;font-weight:600">'+esc(item.id)+'</td>'
            +'<td style="font-weight:500">'+esc(item.name)+'</td>'
            +'<td>'+esc(item.supplier||'—')+'</td>'
            +'<td style="text-align:right;font-weight:700">'+item.qty+'</td>'
            +'<td style="color:#94a3b8">'+esc(item.unit)+'</td>'
            +'<td>'+bdg(item.status,SBGC[item.status]||'#f1f5f9',SCOL[item.status]||'#475569')+'</td>'
            +'<td style="color:'+(item.price>0?'#16a34a':'#94a3b8')+';font-weight:'+(item.price>0?700:400)+'">'+( item.price>0?fmtVND(item.price):'—')+'</td>'
            +'<td style="white-space:nowrap">'
            +'<button class="btn btn-xs" style="background:#eff6ff;color:#2563eb;margin-right:3px" onclick="searchPrice(\''+esc(item.name)+'\')">&#128269;</button>'
            +'<button class="btn btn-xs" style="margin-right:3px" onclick="editItem('+ci+','+ii+')">&#9999;&#65039;</button>'
            +'<button class="btn btn-xs btn-red" onclick="delItem('+ci+','+ii+')">&#128465;</button>'
            +'</td></tr>';
        });
        html+='</tbody></table></div>';
      }
    }
    html+='</div>';
  });

  // Summary
  var allI=p.bom.cumList.reduce(function(a,c){return a.concat(c.items);},[]);
  var sm={};allI.forEach(function(i){var k=i.name.toLowerCase();if(!sm[k])sm[k]={name:i.name,qty:0,unit:i.unit,price:i.price,supplier:i.supplier};sm[k].qty+=i.qty;if(i.price>0&&!sm[k].price)sm[k].price=i.price;});
  var srows=Object.values(sm).sort(function(a,b){return a.name.localeCompare(b.name);});
  if(srows.length){
    var gT=srows.reduce(function(s,r){return s+r.qty*(r.price||0);},0);
    html+='<div class="summary"><div class="summary-hdr">&#128202; T\u1ed5ng h\u1ee3p v\u1eadt t\u01b0 (g\u1ed9p tr\u00f9ng t\u1eeb t\u1ea5t c\u1ea3 c\u1ee5m)</div>'
      +'<div style="overflow-x:auto"><table class="tbl"><thead><tr style="background:#eff6ff"><th style="color:#1d4ed8">T\u00ean</th><th style="color:#1d4ed8">NCC</th><th style="color:#1d4ed8">T\u1ed5ng SL</th><th style="color:#1d4ed8">\u0110V</th><th style="color:#1d4ed8">\u0110\u01a1n gi\u00e1</th><th style="color:#1d4ed8">Th\u00e0nh ti\u1ec1n</th></tr></thead><tbody>';
    srows.forEach(function(r){html+='<tr><td style="font-weight:500">'+esc(r.name)+'</td><td>'+esc(r.supplier||'—')+'</td><td style="text-align:right;font-weight:700;color:#2563eb">'+r.qty+'</td><td style="color:#94a3b8">'+esc(r.unit)+'</td><td>'+( r.price>0?fmtVND(r.price):'—')+'</td><td style="color:#16a34a;font-weight:700">'+( r.price>0?fmtVND(r.qty*r.price):'—')+'</td></tr>';});
    html+='<tr class="tbl-total"><td colspan="5">T\u1ed5ng c\u1ed9ng</td><td>'+fmtVND(gT)+'</td></tr>';
    html+='</tbody></table></div></div>';
  }
  return html;
}

function renderGC(p){
  var items=p.bom.giaCong;
  var tC=items.filter(function(i){return i.loai==='Chi ti\u1ebft';}).reduce(function(s,i){return s+i.qty*i.donGia;},0);
  var tCu=items.filter(function(i){return i.loai==='C\u1ee5m';}).reduce(function(s,i){return s+i.qty*i.donGia;},0);
  var html='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">'
    +[{l:'Chi ti\u1ebft GC',v:tC,c:'#2563eb'},{l:'C\u1ee5m GC',v:tCu,c:'#7c3aed'},{l:'T\u1ed5ng c\u1ed9ng',v:tC+tCu,c:'#16a34a'}].map(function(m){
      return '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:4px">'+m.l+'</div><div style="font-size:16px;font-weight:800;color:'+m.c+'">'+fmtVND(m.v)+'</div></div>';
    }).join('')+'</div>';

  html+='<div id="gcForm" style="display:none" class="add-form-gc">'
    +'<div style="font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:10px">Th\u00eam h\u1ea1ng m\u1ee5c gia c\u00f4ng</div>'
    +'<div class="fg6" style="margin-bottom:8px">';
  [['gc_name','T\u00ean *','text'],['gc_loai','Lo\u1ea1i','sel-gc'],['gc_qty','SL','number'],['gc_unit','DV','sel-unit'],['gc_donGia','Don gia','number'],['gc_ghiChu','Ghi chu','text']].forEach(function(r){
    html+='<div><div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:3px">'+r[1]+'</div>';
    if(r[2]==='sel-gc') html+='<select id="'+r[0]+'">'+GCLT.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>';
    else if(r[2]==='sel-unit') html+='<select id="'+r[0]+'">'+BUNT.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>';
    else html+='<input type="'+(r[2]==='number'?'number':'text')+'" id="'+r[0]+'" value="'+(r[2]==='number'?'0':'')+'">';
    html+='</div>';
  });
  html+='</div><div style="display:flex;gap:8px"><button class="btn btn-sm btn-purple" onclick="addGC()">Th\u00eam</button><button class="btn btn-sm" onclick="toggleGCForm()">H\u1ee7y</button></div></div>'
    +'<div style="margin-bottom:12px"><button class="btn btn-sm btn-purple" onclick="toggleGCForm()">+ Th\u00eam gia c\u00f4ng</button></div>'
    +'<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>M\u00e3</th><th>T\u00ean chi ti\u1ebft/c\u1ee5m</th><th>Lo\u1ea1i</th><th>SL</th><th>\u0110V</th><th>\u0110\u01a1n gi\u00e1</th><th>Th\u00e0nh ti\u1ec1n</th><th>Ghi ch\u00fa</th><th></th></tr></thead><tbody>';
  if(!items.length) html+='<tr><td colspan="9" style="text-align:center;padding:20px;color:#94a3b8">Ch\u01b0a c\u00f3 h\u1ea1ng m\u1ee5c</td></tr>';
  items.forEach(function(it,i){
    var tt=it.qty*it.donGia;var lb=it.loai==='C\u1ee5m'?{bg:'#f5f3ff',c:'#7c3aed'}:{bg:'#eff6ff',c:'#2563eb'};
    html+='<tr><td style="color:#94a3b8;font-size:11px;font-weight:600">'+esc(it.id)+'</td><td style="font-weight:500">'+esc(it.name)+'</td><td>'+bdg(it.loai,lb.bg,lb.c)+'</td><td style="text-align:right;font-weight:700">'+it.qty+'</td><td style="color:#94a3b8">'+esc(it.unit)+'</td><td>'+(it.donGia>0?fmtVND(it.donGia):'—')+'</td><td style="color:#16a34a;font-weight:700">'+(tt>0?fmtVND(tt):'—')+'</td><td style="color:#94a3b8;font-size:12px">'+esc(it.ghiChu||'—')+'</td>'
      +'<td style="white-space:nowrap"><button class="btn btn-xs" style="margin-right:3px" onclick="editGC('+i+')">&#9999;&#65039;</button><button class="btn btn-xs btn-red" onclick="delGC('+i+')">&#128465;</button></td></tr>';
  });
  if(items.length) html+='<tr class="tbl-total"><td colspan="6">T\u1ed5ng c\u1ed9ng</td><td>'+fmtVND(items.reduce(function(s,i){return s+i.qty*i.donGia;},0))+'</td><td colspan="2"></td></tr>';
  html+='</tbody></table></div>';
  return html;
}

function renderBOM(){
  var projBtns=S.projects.map(function(pr){
    var a=S.bomPId===pr.id;
    return '<button onclick="S.bomPId='+pr.id+';render()" style="padding:7px 14px;border-radius:8px;border:1.5px solid '+(a?'#2563eb':'#e2e8f0')+';background:'+(a?'#2563eb':'#fff')+';color:'+(a?'#fff':'#475569')+';font-weight:'+(a?700:400)+';font-size:13px">'+esc(pr.name)+'</button>';
  }).join('');

  var html='<div class="card" style="margin-bottom:14px"><div style="padding:12px 18px"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span style="font-size:12px;font-weight:700;color:#64748b">Ch\u1ecdn d\u1ef1 \u00e1n:</span>'+projBtns+'</div></div></div>';

  var p=curP();

    return html+'<div class="card"><div class="empty"><div class="empty-icon">&#128297;</div><div style="font-weight:600;color:#475569">Ch\u1ecdn m\u1ed9t d\u1ef1 \u00e1n \u0111\u1ec3 xem BOM</div></div></div>';
  }

  html+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #f1f5f9;flex-wrap:wrap;gap:10px">'
    +'<div><div style="font-weight:700;font-size:15px">'+esc(p.name)+'</div><div style="font-size:12px;color:#94a3b8;margin-top:2px">'+esc(p.client)+'</div></div>'
    +'<div style="display:flex;gap:8px"><button class="btn btn-sm" style="background:#fffbeb;color:#d97706;border-color:#fde68a" onclick="expVT()">Xu\u1ea5t v\u1eadt t\u01b0</button><button class="btn btn-sm" style="background:#f5f3ff;color:#7c3aed;border-color:#ddd6fe" onclick="expGC()">Xu\u1ea5t gia c\u00f4ng</button></div></div>'
    +'<div style="padding:14px 18px">'
    +'<div style="display:flex;gap:3px;background:#f1f5f9;border-radius:9px;padding:3px;width:fit-content;margin-bottom:14px">'
    +'<button onclick="S.bomSub=\'vattu\';render()" style="padding:7px 16px;border-radius:7px;border:none;background:'+(S.bomSub==='vattu'?'#fff':'transparent')+';color:'+(S.bomSub==='vattu'?'#2563eb':'#64748b')+';font-weight:'+(S.bomSub==='vattu'?700:500)+';font-size:13px;box-shadow:'+(S.bomSub==='vattu'?'0 1px 3px rgba(0,0,0,.08)':'none')+'">V\u1eadt t\u01b0 theo c\u1ee5m</button>'
    +'<button onclick="S.bomSub=\'giacong\';render()" style="padding:7px 16px;border-radius:7px;border:none;background:'+(S.bomSub==='giacong'?'#fff':'transparent')+';color:'+(S.bomSub==='giacong'?'#7c3aed':'#64748b')+';font-weight:'+(S.bomSub==='giacong'?700:500)+';font-size:13px;box-shadow:'+(S.bomSub==='giacong'?'0 1px 3px rgba(0,0,0,.08)':'none')+'">BOM Gia c\u00f4ng</button>'
    +'</div>'
    +(S.bomSub==='vattu'?renderVT(p):renderGC(p))
    +'</div></div>';
  return html;
}

function render(){
  var done=S.projects.reduce(function(a,p){return a+Object.values(p.phases).filter(function(ph){return ph.status==='done';}).length;},0);
  var total=S.projects.length*4||1;

  var html=renderHistory()+renderMetrics();

  // Tabs
  html+='<div class="tabs">'

    +'<button class="tab'+(S.tab==='bom'?' active':'')+'" onclick="S.tab=\'bom\';render()">&#128297; BOM &amp; Gia c\u00f4ng</button>'
    +'<button class="tab'+(S.showHist?' active':'')+'" onclick="S.showHist=!S.showHist;render()">&#128338; L\u1ecbch s\u1eed ('+S.hist.length+')</button>'
    +'<button class="tab" onclick="expTD()" style="max-width:140px">\u21e9 Xu\u1ea5t ti\u1ebfn \u0111\u1ed9</button>'
    +'</div>';

  if(S.tab==='overview') html+=renderOverview();
  else html+=renderBOM();

  document.getElementById('app').innerHTML=html;
}

render();
