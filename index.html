<style>

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f9;color:#212121}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
input,select,textarea,button{font-family:inherit;font-size:13px;color:#212121}
button{cursor:pointer;border:1px solid #e0e0e0;border-radius:8px;padding:8px 14px;background:#f5f5f5;font-weight:600}
button:hover{opacity:.85}
table{border-collapse:collapse;width:100%}
th,td{text-align:left;padding:8px 10px;font-size:13px}
th{font-weight:600;color:#616161;font-size:12px;border-bottom:2px solid #e0e0e0;white-space:nowrap;background:#f5f5f5}

input[type=text],input[type=number],input[type=date],select,textarea{padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:8px;width:100%;background:#fff}

.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px 18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}

.label{font-size:12px;font-weight:700;color:#424242;display:block;margin-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.phase-card{border-radius:10px;padding:12px 14px;cursor:pointer;border:2px solid #bdbdbd;transition:transform .15s;user-select:none}
.phase-card:hover{transform:translateY(-2px)}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;display:inline-block}
.pbar-wrap{background:#e0e0e0;border-radius:6px;height:8px;overflow:hidden}
.pbar-fill{height:100%;border-radius:6px;transition:width .4s}
.tabs{display:flex;border-bottom:2px solid #e0e0e0;margin-bottom:16px}
.tab{padding:10px 22px;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;color:#757575;font-weight:400;font-size:13px;cursor:pointer}
.tab.active{color:#1976d2;border-bottom-color:#1976d2;font-weight:700}
.metric{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px}
.metric .num{font-size:22px;font-weight:700}
.metric .lbl{font-size:11px;color:#9e9e9e;margin-bottom:6px}
.section{background:#fff;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;margin-bottom:12px}
.sec-hdr{background:#f8f9fa;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.sec-body{padding:12px 14px}
.file-row{display:flex;align-items:center;gap:8px;background:#f5f5f5;border-radius:8px;padding:7px 10px;margin-bottom:6px}
.hist-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:#f8f9fa;border-radius:10px;border:1px solid #e0e0e0;margin-bottom:8px;flex-wrap:wrap}
a{color:#1976d2;text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}

#toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;display:none}

// ── FIREBASE ───────────────────────────────────────────────
var fbConfig={
  apiKey:"AIzaSyAzBcUvQRBgt7ITBy7tpqWYcBqBNgFofRY",

  databaseURL:"https://quan-ly-du-an-da802-default-rtdb.asia-southeast1.firebasedatabase.app",

  appId:"1:283670804509:web:da33006c0c640c578c6ef4"
};
firebase.initializeApp(fbConfig);
var db=firebase.database();
var DB_PATH='atpm/projects';
var DB_HIST='atpm/history';
var _fbSaveTimer=null;
var _isOnline=false;

function fbSave(label){
  // debounce 800ms to avoid too many writes
  if(_fbSaveTimer)clearTimeout(_fbSaveTimer);
  _fbSaveTimer=setTimeout(function(){
    if(!_isOnline)return;
    db.ref(DB_PATH).set(STATE.projects).catch(function(e){console.warn('FB save error',e);});
    if(label){
      STATE.hist=pushHist(STATE.hist,STATE.projects,label);
      db.ref(DB_HIST).set(STATE.hist).catch(function(e){console.warn('FB hist error',e);});
    }
    lsSave(STATE.projects,STATE.hist);
    updateSyncStatus('saved');
  },800);
}

function updateSyncStatus(status){
  var el=document.getElementById('syncStatus');if(!el)return;
  if(status==='saved'){el.textContent='\u2705 \u0110\u00e3 \u0111\u1ed3ng b\u1ed9';el.style.color='#2e7d32';}
  else if(status==='saving'){el.textContent='\u23f3 \u0110ang l\u01b0u...';el.style.color='#e65100';}
  else if(status==='offline'){el.textContent='\uD83D\uDFE1 Offline \u2014 l\u01b0u c\u1ee5c b\u1ed9';el.style.color='#e65100';}
  else if(status==='error'){el.textContent='\u274C L\u1ed7i k\u1ebft n\u1ed1i';el.style.color='#c62828';}
}

// Override save to also write to Firebase
var _origSave=save;
save=function(label){
  lsSave(STATE.projects,STATE.hist);
  fbSave(label);
};

// Listen for realtime changes from other devices
db.ref(DB_PATH).on('value',function(snap){
  var data=snap.val();
  if(!data)return;
  // merge: only update if different from current to avoid loop
  var remote=JSON.stringify(data);
  var local=JSON.stringify(STATE.projects);
  if(remote!==local){
    STATE.projects=data;
    lsSave(STATE.projects,STATE.hist);
    render();
    updateSyncStatus('saved');
  }
});
db.ref(DB_HIST).on('value',function(snap){
  var data=snap.val();
  if(!data)return;
  if(JSON.stringify(data)!==JSON.stringify(STATE.hist)){
    STATE.hist=data;
    lsSave(STATE.projects,STATE.hist);
  }
});

// Online/offline detection
db.ref('.info/connected').on('value',function(snap){
  _isOnline=snap.val()===true;
  updateSyncStatus(_isOnline?'saved':'offline');
});
var _confirmCb=null;
function showConfirm(msg,cb){
  _confirmCb=cb;
  var el=document.getElementById('confirmModal');
  document.getElementById('confirmMsg').textContent=msg;
  el.style.display='flex';
}
function confirmOK(){
  document.getElementById('confirmModal').style.display='none';
  if(_confirmCb){_confirmCb();_confirmCb=null;}
}
function confirmCancel(){
  document.getElementById('confirmModal').style.display='none';
  _confirmCb=null;
}

// ── TOAST ──────────────────────────────────────────────────
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}

// ── STORAGE ────────────────────────────────────────────────
var SK='atpm_d',HK='atpm_h',MH=5;
function lsGet(k){try{var s=localStorage.getItem(k);return s?JSON.parse(s):null;}catch(e){return null;}}
function lsSave(p,h){try{localStorage.setItem(SK,JSON.stringify(p));localStorage.setItem(HK,JSON.stringify(h));}catch(e){}}
function cloneDeep(o){return JSON.parse(JSON.stringify(o));}
function pushHist(hist,proj,lb){
  var snap={id:Date.now(),lb:lb,ts:new Date().toLocaleString('vi-VN'),data:cloneDeep(proj)};
  return [snap].concat(hist).slice(0,MH);
}

// ── COLORS ─────────────────────────────────────────────────
var ST_CO={done:'#2e7d32','in-progress':'#1565c0',review:'#e65100',pending:'#616161'};
var ST_BG={done:'#e8f5e9','in-progress':'#e3f2fd',review:'#fff8e1',pending:'#f5f5f5'};
var ST_BO={done:'#81c784','in-progress':'#64b5f6',review:'#ffcc02',pending:'#bdbdbd'};
var ST_DK={done:'#1b5e20','in-progress':'#0d47a1',review:'#bf360c',pending:'#424242'};
var ST_LB={done:'Ho\u00e0n th\u00e0nh','in-progress':'\u0110ang th\u1ef1c hi\u1ec7n',review:'\u0110ang review',pending:'Ch\u01b0a b\u1eaft \u0111\u1ea7u'};
var PH_LB={concept:'Concept','3d':'3D Model','2d':'2D Drawing',bom:'BOM'};
var PH_IC={concept:'&#128161;','3d':'&#129512;','2d':'&#128208;',bom:'&#128203;'};
var BSTS=['\u0110\u00e3 x\u00e1c nh\u1eadn','\u0110\u00e3 \u0111\u1eb7t h\u00e0ng','Ch\u1edd b\u00e1o gi\u00e1'];
var BUNT=['c\u00e1i','b\u1ed9','m','kg','cu\u1ed9n','h\u1ed9p','c\u1eb7p','t\u1ea5m','c\u1ee5m'];
var GCLT=['Chi ti\u1ebft','C\u1ee5m'];
var SCOL={'\u0110\u00e3 x\u00e1c nh\u1eadn':'#2e7d32','Ch\u1edd b\u00e1o gi\u00e1':'#bf360c','\u0110\u00e3 \u0111\u1eb7t h\u00e0ng':'#1565c0'};
var SBGC={'\u0110\u00e3 x\u00e1c nh\u1eadn':'#e8f5e9','Ch\u1edd b\u00e1o gi\u00e1':'#fff3e0','\u0110\u00e3 \u0111\u1eb7t h\u00e0ng':'#e3f2fd'};

// ── UTILS ──────────────────────────────────────────────────
var IID=300;function uid(){return 'u'+(++IID);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtVND(n){return n>0?n.toLocaleString('vi-VN')+' \u20ab':'—';}
function fd(d){if(!d)return '—';var t=new Date(d);return t.getDate()+'/'+(t.getMonth()+1)+'/'+t.getFullYear();}
function workdays(s,e){if(!s||!e)return null;var a=new Date(s),b=new Date(e);if(isNaN(a.getTime())||isNaN(b.getTime())||b<a)return null;var n=0,c=new Date(a);while(c<=b){var d=c.getDay();if(d&&d<6)n++;c.setDate(c.getDate()+1);}return n;}
function getOverall(ph){var keys=Object.keys(ph),s=0;keys.forEach(function(k){s+=ph[k].progress;});return Math.round(s/keys.length);}
function getDL(d){var df=Math.ceil((new Date(d)-new Date())/86400000);if(df<0)return{t:'Qua han',c:'#c62828',b:'#ffebee'};if(df<=14)return{t:'Con '+df+' ngay',c:'#e65100',b:'#fff3e0'};return{t:'Con '+df+' ngay',c:'#2e7d32',b:'#e8f5e9'};}
function nextGCId(arr){var n=arr.map(function(i){return parseInt(i.id.replace('GC-',''))||0;});return 'GC-'+String(Math.max.apply(null,[0].concat(n))+1).padStart(3,'0');}
function pbar(v,c){return '<div class="pbar-wrap"><div class="pbar-fill" style="width:'+v+'%;background:'+(c||'#1976d2')+'"></div></div>';}
function btnHtml(label,onclick,bg,color,extra){bg=bg||'#f5f5f5';color=color||'#424242';extra=extra||'';return '<button onclick="'+onclick+'" style="background:'+bg+';color:'+color+';border-color:'+bg+';'+extra+'">'+label+'</button>';}

// ── CSV / JSON EXPORT ──────────────────────────────────────
function dlBlob(content,type,filename){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:type}));a.download=filename;document.body.appendChild(a);a.click();a.remove();}
function dlCSV(rows,fn){var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c==null?'':c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');dlBlob('\uFEFF'+csv,'text/csv;charset=utf-8',fn);}
function expTD(){var rows=[['BOM TIEN DO'],['Ngay: '+new Date().toLocaleDateString('vi-VN')],[],['STT','Du an','Khach hang','Deadline','Tong','Concept','3D','2D','BOM','Tinh trang']];STATE.projects.forEach(function(p,i){var o=getOverall(p.phases);rows.push([i+1,p.name,p.client,p.deadline,o+'%',p.phases.concept.progress+'% - '+ST_LB[p.phases.concept.status],p.phases['3d'].progress+'% - '+ST_LB[p.phases['3d'].status],p.phases['2d'].progress+'% - '+ST_LB[p.phases['2d'].status],p.phases.bom.progress+'% - '+ST_LB[p.phases.bom.status],o===100?'Hoan thanh':'Dang thuc hien']);});dlCSV(rows,'TienDo.csv');}
function expVT(){var p=curBomProject();if(!p)return;var rows=[[p.name],[p.client],[],[]];p.bom.cumList.forEach(function(c){rows.push(['CUM: '+c.name],['Ten','SL','DV','NCC','Trang thai','Don gia','Thanh tien']);c.items.forEach(function(i){rows.push([i.name,i.qty,i.unit,i.supplier,i.status,i.price||'',i.price?i.qty*i.price:'']);});rows.push([]);});var sum={};p.bom.cumList.reduce(function(a,c){return a.concat(c.items);},[]).forEach(function(i){var k=i.name.toLowerCase();if(!sum[k])sum[k]={name:i.name,qty:0,price:i.price,unit:i.unit};sum[k].qty+=i.qty;if(i.price>0&&!sum[k].price)sum[k].price=i.price;});rows.push(['TONG HOP VT'],['Ten','Tong SL','DV','Don gia','Thanh tien']);Object.values(sum).forEach(function(r){rows.push([r.name,r.qty,r.unit,r.price||'',r.price?r.qty*r.price:'']);});dlCSV(rows,'VatTu_'+p.name+'.csv');}
function expGC(){var p=curBomProject();if(!p)return;var rows=[[p.name],[p.client],[],['Ma','Ten','Loai','SL','DV','Don gia','Thanh tien','Ghi chu']];p.bom.giaCong.forEach(function(i){rows.push([i.id,i.name,i.loai,i.qty,i.unit,i.donGia,i.qty*i.donGia,i.ghiChu]);});dlCSV(rows,'GiaCong_'+p.name+'.csv');}
function expJSON(){dlBlob(JSON.stringify(STATE.projects,null,2),'application/json','backup_'+Date.now()+'.json');}
function impJSON(input){var file=input.files[0];if(!file)return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(!Array.isArray(d))throw 0;var nh=pushHist(STATE.hist,d,'Nhap file: '+file.name);STATE.projects=d;STATE.hist=nh;lsSave(d,nh);render();

// ── PWA SETUP ─────────────────────────────────────────────
(function(){
  // Manifest
  var manifest={
    name:'Qu\u1ea3n l\u00fd Ti\u1ebfn \u0111\u1ed9 T\u1ef1 \u0111\u1ed9ng h\u00f3a',
    short_name:'Ti\u1ebfn \u0111\u1ed9 T\u0110H',
    description:'Qu\u1ea3n l\u00fd ti\u1ebfn \u0111\u1ed9 thi\u1ebft k\u1ebf t\u1ef1 \u0111\u1ed9ng h\u00f3a: Concept, 3D, 2D, BOM',
    start_url:'.',
    display:'standalone',
    background_color:'#f4f6f9',
    theme_color:'#1976d2',
    orientation:'portrait-primary',
    icons:[
      {src:makeIcon(192,'#1976d2'),sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:makeIcon(512,'#1976d2'),sizes:'512x512',type:'image/png',purpose:'any maskable'}
    ]
  };
  function makeIcon(size,bg){
    var c=document.createElement('canvas');c.width=size;c.height=size;
    var ctx=c.getContext('2d');
    // background
    ctx.fillStyle=bg;
    var r=size*0.18;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
    // icon: clipboard
    ctx.fillStyle='#fff';
    var s=size*0.55,x=(size-s)/2,y=(size-s)/2+size*0.04;
    ctx.beginPath();ctx.roundRect(x,y,s,s,s*0.1);ctx.fill();
    ctx.fillStyle=bg;
    // lines
    var lx=x+s*0.18,lw=s*0.64,lh=s*0.07,gap=s*0.16;
    [0,1,2,3].forEach(function(i){ctx.fillStyle=i===0?'#1976d2':'#90caf9';ctx.beginPath();ctx.roundRect(lx,y+s*0.22+i*gap,lw*(i===0?1:0.7+Math.random()*0.3),lh,lh/2);ctx.fill();});
    // top clip
    ctx.fillStyle=bg;ctx.fillRect(size*0.35,y-2,size*0.3,size*0.08);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(size*0.37,y-size*0.02,size*0.26,size*0.07,size*0.02);ctx.fill();
    return c.toDataURL('image/png');
  }
  var blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  document.getElementById('manifestLink').href=url;

  // Service Worker
  var swCode=[
    'var CACHE="tdtdh-v1";',
    'var URLS=["/"];',
    'self.addEventListener("install",function(e){',
    '  e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(URLS);}));',
    '  self.skipWaiting();',
    '});',
    'self.addEventListener("activate",function(e){',
    '  e.waitUntil(caches.keys().then(function(ks){return Promise.all(ks.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));}));',
    '  self.clients.claim();',
    '});',
    'self.addEventListener("fetch",function(e){',
    '  e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request).catch(function(){return caches.match("/");});}));',
    '});'
  ].join('\n');
  var swBlob=new Blob([swCode],{type:'application/javascript'});
  var swUrl=URL.createObjectURL(swBlob);
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register(swUrl).then(function(){
      console.log('SW registered');
    }).catch(function(e){console.log('SW error',e);});
  }

  // Install prompt
  var deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();deferredPrompt=e;showInstallBar();
  });
  function showInstallBar(){
    if(document.getElementById('installBar'))return;
    var bar=document.createElement('div');
    bar.id='installBar';
    bar.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#1976d2;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:8000;box-shadow:0 -2px 12px rgba(0,0,0,.15)';
    bar.innerHTML='<span style="font-size:13px;font-weight:600">&#128640; C\u00e0i \u0111\u1eb7t \u1ee9ng d\u1ee5ng v\u00e0o thi\u1ebft b\u1ecb</span>'
      +'<div style="display:flex;gap:8px">'
      +'<button id="installBtn" style="background:#fff;color:#1976d2;border:none;border-radius:8px;padding:7px 16px;font-weight:700;cursor:pointer;font-size:13px">C\u00e0i ngay</button>'
      +'<button id="installClose" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px">&#10005;</button>'
      +'</div>';
    document.body.appendChild(bar);
    document.getElementById('installBtn').onclick=function(){
      if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;bar.remove();});}
    };
    document.getElementById('installClose').onclick=function(){bar.remove();};
  }

  // iOS hint
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
  var isStandalone=window.navigator.standalone;
  if(isIOS&&!isStandalone){
    setTimeout(function(){
      if(document.getElementById('iosHint'))return;
      var hint=document.createElement('div');
      hint.id='iosHint';

function addProject(){
  var name=document.getElementById('np_name');
  var client=document.getElementById('np_client');
  var deadline=document.getElementById('np_deadline');
  if(!name||!name.value.trim()){alert('Vui long nhap ten du an!');return;}
  var maxId=STATE.projects.reduce(function(m,p){return Math.max(m,p.id);},0);
  var newProj={
    id:maxId+1,
    name:name.value.trim(),
    client:client.value.trim()||'—',
    deadline:deadline.value||'',
    phases:{
      concept:{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},
      '3d':{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},
      '2d':{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''},
      bom:{status:'pending',progress:0,assignee:'',notes:'',files:[],startDate:'',endDate:''}
    },
    bom:{cumList:[],giaCong:[]}
  };
  STATE.projects.push(newProj);
  save('Them du an: '+newProj.name);
  render();
  toast('Da tao du an: '+newProj.name);
}

  var p=curBomProject();if(!p)return;var item=p.bom.cumList[ci].items[ii];
  var name=prompt('Ten vat tu:',item.name);if(name===null)return;
  var qty=prompt('So luong:',item.qty);if(qty===null)return;
  var price=prompt('Don gia:',item.price);if(price===null)return;
  var supplier=prompt('Nha cung cap:',item.supplier);if(supplier===null)return;
  item.name=name;item.qty=+qty||1;item.price=+price||0;item.supplier=supplier;
  save('Sua linh kien');render();
}
function searchPrice(name){window.open('https://www.google.com/search?q='+encodeURIComponent(name+' gia ban Vietnam'),'_blank');}
function toggleGCForm(){var el=document.getElementById('gcForm');if(el)el.style.display=el.style.display==='none'?'block':'none';}
function addGC(){
  var p=curBomProject();if(!p)return;
  var name=document.getElementById('gc_name');if(!name||!name.value.trim())return;
  var loai=document.getElementById('gc_loai');var qty=document.getElementById('gc_qty');var unit=document.getElementById('gc_unit');var donGia=document.getElementById('gc_donGia');var ghiChu=document.getElementById('gc_ghiChu');
  p.bom.giaCong.push({id:nextGCId(p.bom.giaCong),name:name.value.trim(),loai:loai.value,qty:+qty.value||1,unit:unit.value,donGia:+donGia.value||0,ghiChu:ghiChu.value});
  save('Them gia cong');render();
}
function delGC(i){showConfirm('Xoa hang muc nay?',function(){var p=curBomProject();if(!p)return;p.bom.giaCong.splice(i,1);save('Xoa gia cong');render();});}
function editGC(i){
  var p=curBomProject();if(!p)return;var item=p.bom.giaCong[i];
  var name=prompt('Ten:',item.name);if(name===null)return;
  var qty=prompt('So luong:',item.qty);if(qty===null)return;
  var donGia=prompt('Don gia:',item.donGia);if(donGia===null)return;
  var ghiChu=prompt('Ghi chu:',item.ghiChu);if(ghiChu===null)return;
  item.name=name;item.qty=+qty||1;item.donGia=+donGia||0;item.ghiChu=ghiChu;
  save('Sua gia cong');render();
}
function snapshot(){var nh=pushHist(STATE.hist,STATE.projects,'Snapshot thu cong');STATE.hist=nh;lsSave(STATE.projects,nh);toast('Da luu snapshot!');}

// ── after render, patch all data-txt elements with real Unicode ──
function patchText(){
  document.querySelectorAll('[data-txt]').forEach(function(el){
    el.textContent=el.getAttribute('data-txt');
  });
  document.querySelectorAll('[data-val]').forEach(function(el){
    el.value=el.getAttribute('data-val');
  });
  document.querySelectorAll('[data-ph]').forEach(function(el){
    el.placeholder=el.getAttribute('data-ph');
  });
  document.querySelectorAll('[data-opt]').forEach(function(sel){
    var opts=JSON.parse(sel.getAttribute('data-opt'));
    var cur=sel.getAttribute('data-cur')||'';
    sel.innerHTML='';
    opts.forEach(function(o){
      var op=document.createElement('option');
      op.value=o;op.textContent=o;
      if(o===cur)op.selected=true;
      sel.appendChild(op);
    });
  });
}

    +'<div style="display:flex;align-items:center;gap:10px;margin-top:2px">'
    +'<div style="font-size:13px;color:#757575" data-txt="Concept \u00b7 3D \u00b7 2D \u00b7 BOM"></div>'
    +'<div id="syncStatus" style="font-size:11px;font-weight:600;color:#9e9e9e">\u23f3 \u0110ang k\u1ebft n\u1ed1i...</div>'
    +'</div></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
    +'<button onclick="expTD()" style="background:#1976d2;color:#fff;border-color:#1976d2" data-txt="&#128203; Xu\u1ea5t ti\u1ebfn \u0111\u1ed9"></button>'
    +'<button onclick="snapshot()" style="background:#2e7d32;color:#fff;border-color:#2e7d32" data-txt="&#128190; L\u01b0u snapshot"></button>'
    +'<button onclick="STATE.showHist=!STATE.showHist;render()" style="background:'+(STATE.showHist?'#424242':'#f5f5f5')+';color:'+(STATE.showHist?'#fff':'#424242')+'" data-txt="&#128338; L\u1ecbch s\u1eed ('+STATE.hist.length+')"></button>'
    +'</div></div>';
  html+=renderHistory();
  html+=renderMetrics();
  // tabs
  html+='<div class="tabs">'
    +'<button class="tab'+(STATE.tab==='overview'?' active':'')+'" onclick="STATE.tab=\'overview\';render()" data-txt="&#128203; T\u1ed5ng quan"></button>'
    +'<button class="tab'+(STATE.tab==='bom'?' active':'')+'" onclick="STATE.tab=\'bom\';render()" data-txt="&#128297; BOM &amp; Gia c\u00f4ng"></button>'
    +'</div>';
  if(STATE.tab==='overview') html+=renderOverview();

  document.getElementById('app').innerHTML=html;
  patchText();
}

render();
</script>
